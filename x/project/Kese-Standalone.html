    { id: "kira",       label: "Kira",            color: "#a855f7", icon: "home" },
    { id: "faturalar",  label: "Faturalar",       color: "#06b6d4", icon: "file-text" },
    { id: "eglence",    label: "Eğlence",         color: "#ec4899", icon: "music" },
    { id: "saglik",     label: "Sağlık",          color: "#ef4444", icon: "heart" },
    { id: "egitim",     label: "Eğitim",          color: "#10b981", icon: "book" },
    { id: "alisveris",  label: "Alışveriş",       color: "#f97316", icon: "bag" },
    { id: "abonelik",   label: "Abonelikler",     color: "#8b5cf6", icon: "repeat" },
    { id: "maas",       label: "Maaş",            color: "#84cc16", icon: "wallet" },
    { id: "freelance",  label: "Freelance",       color: "#14b8a6", icon: "briefcase" },
    { id: "yatirim",    label: "Yatırım Getirisi", color: "#0ea5e9", icon: "trending-up" },
    { id: "diger",      label: "Diğer",           color: "#64748b", icon: "more" },
  ];

  // Boş veri — kullanıcı kendi hesaplarını, işlemlerini, borçlarını ve bütçesini ekler.
  const accounts = [];
  const transactions = [];
  const budgets = [];
  const debts = [];

  // Boş tarih serileri — bilgisel grafikler için iskelet (son 12 ay etiketleri)
  const monthNames = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  const today = appToday();
  const monthly = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    monthly.push({
      label: monthNames[d.getMonth()],
      year: d.getFullYear(),
      month: d.getMonth(),
      income: 0,
      expense: 0,
      net: 0,
    });
  }
  const netWorth = monthly.map((m) => ({ label: m.label, value: 0 }));

  return { fmt, fmtShort, accounts, categories, transactions, budgets, debts, monthly, netWorth };
})();

    { id: "htx-d10", holdingId: "h8", date: mAgo(3, 2),  qty: 0.06,  price: 2250000 },
    { id: "htx-d11", holdingId: "h8", date: mAgo(1, 11), qty: -0.03, price: 2500000, note: "Zirvede küçük satış" },
  ];

  // Hedef dağılım (dengeleme kartını besler)
  const pfTargets = { "Hisse": 35, "Yabancı Hisse": 10, "Fon": 10, "Altın": 20, "Döviz": 10, "Kripto": 15 };

  // Portföy değeri geçmişi (90 gün, 2 gün arayla) — zaman çizelgesi, kıyaslama, dağılım-değişimi
  // ve "katkı mı piyasa mı" kartlarını besler. Sınıf bazında hafif farklı tempolarda büyür.
  const typeNow = {};
  holdings.forEach((h) => { typeNow[h.type] = (typeNow[h.type] || 0) + h.quantity * h.price; });
  const pfSnapshots = [];
  for (let i = 90; i >= 2; i -= 2) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
    const p = 1 - i / 90; // 0 → 1
    const byType = {};
    let value = 0;
    Object.entries(typeNow).forEach(([type, nowVal], ti) => {
      const start = 0.80 + ti * 0.02; // her sınıf farklı başlangıç seviyesinden gelir
      const wob = Math.sin((i / 7) + ti * 1.7) * 0.025; // hafif dalgalanma
      const v = Math.round(nowVal * (start + (1 - start) * p + wob) * 100) / 100;
      byType[type] = Math.max(0, v);
      value += byType[type];
    });
    pfSnapshots.push({
      date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`,
      value: Math.round(value * 100) / 100,
      manual: false,
      usdTry: Math.round((34.6 + 3.85 * p + Math.sin(i / 9) * 0.25) * 100) / 100,
      byType,
    });
  }

  return { accounts, transactions, budgets, debts, scheduled, goals, snapshots, holdings, holdingTxs, pfTargets, pfSnapshots };
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ── Money formatting ───────────────────────────
function Money({ value, sign = "auto", className = "", currency = "₺", hide = false, size = "md" }) {
  const v = Number(value || 0);
  const isNeg = v < 0;
  const isPos = v > 0;
  const showSign = sign === "always" || sign === "auto";
  const cls = ["mny", `mny-${size}`];
  if (sign !== "neutral") {
    if (isNeg) cls.push("mny-neg");
    else if (isPos && sign === "always") cls.push("mny-pos");
  }
  if (className) cls.push(className);
  const formatted = APP_DATA.fmt(Math.abs(v));
  const prefix = isNeg ? "−" : isPos && sign === "always" ? "+" : "";
  return (
    <span className={cls.join(" ")}>
      {hide ? "••••" : <>{prefix}{currency}{formatted}</>}
    </span>
  );
}

// ── Pill / Tag ─────────────────────────────────

}

// ── Sparkline ──────────────────────────────────
function Sparkline({ values, color = "currentColor", height = 32, fill = true }) {
  const w = 100;
  const h = height;
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const area = `${path} L${w},${h} L0,${h} Z`;
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ height, width: "100%" }}>
      {fill && <path d={area} fill={color} opacity="0.12" />}
      <path d={path} stroke={color} strokeWidth="1.5" fill="none" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}

// ── Chart tooltip helpers ──────────────────────
function ChartTooltip({ x, y, containerWidth, children }) {
  // Smart positioning to avoid overflow
  const tipWidth = 180;
  const isRight = x + tipWidth + 16 > containerWidth;
  return (
    <div
      className="chart-tip"
      style={{
        left: isRight ? "auto" : x + 12,
        right: isRight ? containerWidth - x + 12 : "auto",
        top: y,
      }}
    >
      {children}
    </div>
  );
}

function useChartHover(count, padL = 8, padR = 2, w = 100) {
  const [hover, setHover] = useState(null); // { idx, mouseX, mouseY }
  const onMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const innerLeft = (padL / w) * rect.width;
    const innerRight = ((w - padR) / w) * rect.width;
    const ratio = Math.max(0, Math.min(1, (x - innerLeft) / (innerRight - innerLeft)));
    const idx = Math.round(ratio * (count - 1));
    setHover({ idx, mouseX: x, mouseY: e.clientY - rect.top, containerWidth: rect.width });
  };
  const onLeave = () => setHover(null);
  return { hover, onMove, onLeave };
}

// ── Area/Line chart with grid + hover ──────────
function AreaChart({ series, height = 240, showGrid = true, showAxis = true, formatY, formatTooltipValue }) {
  // series = [{ label, values: [n], color }]
  const w = 100;
  const h = 100;
  const labels = series[0]?.labels || [];
  const all = series.flatMap((s) => s.values);
  const min = Math.min(0, ...all);
  const max = Math.max(...all);
  const range = max - min || 1;
  const padL = 8, padR = 2, padT = 4, padB = 10;

  const xAt = (i) => padL + (i / Math.max(1, labels.length - 1)) * (w - padL - padR);
  const yAt = (v) => padT + (1 - (v - min) / range) * (h - padT - padB);

  const gridLines = 4;
  const grid = Array.from({ length: gridLines + 1 }, (_, i) => {
    const v = min + (range * (gridLines - i)) / gridLines;
    return { y: padT + (i / gridLines) * (h - padT - padB), v };
  });

  const { hover, onMove, onLeave } = useChartHover(labels.length, padL, padR, w);

  return (
    <div className="chart-wrap" style={{ height }} onMouseMove={onMove} onMouseLeave={onLeave}>
      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="chart-svg">
        {showGrid && grid.map((g, i) => (
          <line key={i} x1={padL} y1={g.y} x2={w - padR} y2={g.y} stroke="var(--border)" strokeWidth="0.15" vectorEffect="non-scaling-stroke" />
        ))}
        {series.map((s, si) => {
          const pts = s.values.map((v, i) => `${xAt(i)},${yAt(v)}`).join(" L");
          const path = `M${pts}`;
          const area = `${path} L${xAt(s.values.length - 1)},${yAt(min)} L${xAt(0)},${yAt(min)} Z`;
          return (
            <g key={si}>
              {s.fill !== false && <path d={area} fill={s.color} opacity="0.12" />}
              <path d={path} stroke={s.color} strokeWidth="1.2" fill="none" vectorEffect="non-scaling-stroke" />
            </g>
          );
        })}
        {hover && (
          <g className="hover-layer">
            <line x1={xAt(hover.idx)} y1={padT} x2={xAt(hover.idx)} y2={h - padB} stroke="var(--fg-3)" strokeWidth="0.3" vectorEffect="non-scaling-stroke" strokeDasharray="1 1"/>
            {series.map((s, si) => (
              <circle key={si} cx={xAt(hover.idx)} cy={yAt(s.values[hover.idx])} r="0.9" fill={s.color} stroke="var(--bg-card)" strokeWidth="0.4" vectorEffect="non-scaling-stroke"/>
            ))}
          </g>
        )}
      </svg>
      {showAxis && (
        <>
          <div className="chart-y-axis">
            {grid.map((g, i) => (
              <div key={i} className="chart-y-tick" style={{ top: `${(g.y / h) * 100}%` }}>
                {formatY ? formatY(g.v) : APP_DATA.fmtShort(g.v)}
              </div>
            ))}
          </div>
          <div className="chart-x-axis">
            {labels.map((l, i) => (
              <div key={i} className="chart-x-tick">{l}</div>
            ))}
          </div>
        </>
      )}
      {hover && labels[hover.idx] !== undefined && (
        <ChartTooltip x={hover.mouseX} y={hover.mouseY - 20} containerWidth={hover.containerWidth}>
          <div className="chart-tip-h">{labels[hover.idx]}</div>
          {series.map((s, si) => (
            <div key={si} className="chart-tip-row">
              <span className="chart-tip-dot" style={{background: s.color}}/>
              <span className="chart-tip-l">{s.name || "Değer"}</span>
              <span className="chart-tip-v mono">{formatTooltipValue ? formatTooltipValue(s.values[hover.idx]) : "₺" + APP_DATA.fmt(s.values[hover.idx])}</span>
            </div>
          ))}
        </ChartTooltip>
      )}
    </div>
  );
}

// ── Bar chart (grouped) + hover ────────────────
function BarChart({ data, height = 240, formatY, formatTooltipValue, seriesLabels }) {
  // data = [{ label, values: [n,n], colors: [c,c] }]
  const w = 100, h = 100;
  const padL = 8, padR = 2, padT = 4, padB = 10;
  const all = data.flatMap((d) => d.values);
  const max = Math.max(...all);
  const min = Math.min(0, ...all);
  const range = max - min || 1;
  const yAt = (v) => padT + (1 - (v - min) / range) * (h - padT - padB);
  const groupW = (w - padL - padR) / data.length;
  const barCount = data[0]?.values.length || 1;
  const innerW = groupW * 0.7;
  const barW = innerW / barCount;
  const gridLines = 4;
  const grid = Array.from({ length: gridLines + 1 }, (_, i) => ({
    y: padT + (i / gridLines) * (h - padT - padB),
    v: min + (range * (gridLines - i)) / gridLines,
  }));
  const zero = yAt(0);

  const [hoverGroup, setHoverGroup] = useState(null);
  const containerRef = useRef(null);

  const onMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const innerLeft = (padL / w) * rect.width;
    const innerRight = ((w - padR) / w) * rect.width;
    const ratio = Math.max(0, Math.min(0.9999, (x - innerLeft) / (innerRight - innerLeft)));
    const idx = Math.floor(ratio * data.length);
    setHoverGroup({ idx, mouseX: x, mouseY: e.clientY - rect.top, containerWidth: rect.width });
  };

  return (
    <div ref={containerRef} className="chart-wrap" style={{ height }} onMouseMove={onMove} onMouseLeave={()=>setHoverGroup(null)}>
      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="chart-svg">
        {grid.map((g, i) => (
          <line key={i} x1={padL} y1={g.y} x2={w - padR} y2={g.y} stroke="var(--border)" strokeWidth="0.15" vectorEffect="non-scaling-stroke" />
        ))}
        {data.map((d, i) => {
          const gx = padL + i * groupW + (groupW - innerW) / 2;
          const isHover = hoverGroup?.idx === i;
          return (
            <g key={i} opacity={hoverGroup && !isHover ? 0.5 : 1}>
              {isHover && <rect x={padL + i * groupW + 0.2} y={padT} width={groupW - 0.4} height={h - padT - padB} fill="var(--fg)" opacity="0.05" rx="0.4"/>}
              {d.values.map((v, j) => {
                const x = gx + j * barW;
                const y = v >= 0 ? yAt(v) : zero;
                const bh = Math.abs(yAt(v) - zero);
                return (
                  <rect key={j} x={x + 0.2} y={y} width={barW - 0.4} height={bh} fill={d.colors[j]} rx="0.4" />
                );
              })}
            </g>
          );
        })}
      </svg>
      <div className="chart-y-axis">
        {grid.map((g, i) => (
          <div key={i} className="chart-y-tick" style={{ top: `${(g.y / h) * 100}%` }}>
            {formatY ? formatY(g.v) : APP_DATA.fmtShort(g.v)}
          </div>
        ))}
      </div>
      <div className="chart-x-axis">
        {data.map((d, i) => (
          <div key={i} className="chart-x-tick">{d.label}</div>
        ))}
      </div>
      {hoverGroup && data[hoverGroup.idx] && (
        <ChartTooltip x={hoverGroup.mouseX} y={hoverGroup.mouseY - 20} containerWidth={hoverGroup.containerWidth}>
          <div className="chart-tip-h">{data[hoverGroup.idx].label}</div>
          {data[hoverGroup.idx].values.map((v, j) => (
            <div key={j} className="chart-tip-row">
              <span className="chart-tip-dot" style={{background: data[hoverGroup.idx].colors[j]}}/>
              <span className="chart-tip-l">{seriesLabels?.[j] || `Değer ${j+1}`}</span>
              <span className="chart-tip-v mono">{formatTooltipValue ? formatTooltipValue(v) : "₺" + APP_DATA.fmt(v)}</span>
            </div>
          ))}
        </ChartTooltip>
      )}
    </div>
  );
}

// ── Donut chart + hover ────────────────────────
function Donut({ segments, size = 180, thickness = 22, center, formatTooltipValue }) {
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  const r = size / 2 - thickness / 2 - 2;
  const c = size / 2;
  const C = 2 * Math.PI * r;
  const [hoverIdx, setHoverIdx] = useState(null);
  let offset = 0;
  const segs = segments.map((s, i) => {
    const len = (s.value / total) * C;
    const seg = { ...s, len, offset, i };
    offset += len;
    return seg;
  });
  return (
    <div className="donut-wrap" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="donut">
        <circle cx={c} cy={c} r={r} fill="none" stroke="var(--bg-elev-2)" strokeWidth={thickness} />
        {segs.map((s) => {
          const dash = `${s.len} ${C - s.len}`;
          const isHover = hoverIdx === s.i;
          const sw = isHover ? thickness + 4 : thickness;
          return (
            <circle
              key={s.i}
              cx={c} cy={c} r={r}
              fill="none"
              stroke={s.color}
              strokeWidth={sw}
              strokeDasharray={dash}
              strokeDashoffset={-s.offset}
              transform={`rotate(-90 ${c} ${c})`}
              strokeLinecap="butt"
              opacity={hoverIdx !== null && !isHover ? 0.4 : 1}
              onMouseEnter={() => setHoverIdx(s.i)}
              onMouseLeave={() => setHoverIdx(null)}
              style={{ cursor: "pointer", transition: "stroke-width 0.12s ease, opacity 0.12s ease" }}
            />
          );
        })}
      </svg>
      {center && hoverIdx === null && <div className="donut-center">{center}</div>}
      {hoverIdx !== null && (
        <div className="donut-center donut-center-hover">
          <div className="donut-center-inner">
            <div className="donut-c-label" style={{color: segments[hoverIdx].color}}>{segments[hoverIdx].label}</div>
            <div className="donut-c-val">{formatTooltipValue ? formatTooltipValue(segments[hoverIdx].value) : "₺" + APP_DATA.fmtShort(segments[hoverIdx].value)}</div>
            <div className="donut-c-pct">%{((segments[hoverIdx].value / total) * 100).toFixed(1)}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Progress bar ───────────────────────────────
function Progress({ value, max, color = "var(--accent)", trackColor = "var(--bg-elev-2)", height = 6 }) {

// ── Stacked area chart + hover ─────────────────
function StackedAreaChart({ series, labels, height = 240, formatY, formatTooltipValue }) {
  // series = [{ label, color, values: [n,...] }]
  const w = 100, h = 100;
  const padL = 8, padR = 2, padT = 4, padB = 10;
  const n = labels.length;

  // Compute cumulative stacks
  const stacks = []; // per index, array of [start, end]
  for (let i = 0; i < n; i++) {
    let acc = 0;
    const col = [];
    for (const s of series) {
      const v = s.values[i] || 0;
      col.push([acc, acc + v]);
      acc += v;
    }
    stacks.push(col);
  }
  const totals = stacks.map(c => c[c.length-1][1]);
  const max = Math.max(...totals) || 1;

  const xAt = (i) => padL + (n === 1 ? 0 : i / (n - 1)) * (w - padL - padR);
  const yAt = (v) => padT + (1 - v / max) * (h - padT - padB);

  const paths = series.map((s, si) => {
    const top = stacks.map((c, i) => `${xAt(i)},${yAt(c[si][1])}`).join(" L");
    const bottom = stacks.map((c, i) => `${xAt(i)},${yAt(c[si][0])}`).reverse().join(" L");
    return { color: s.color, label: s.label, d: `M${top} L${bottom} Z` };
  });

  const grid = [0, 0.25, 0.5, 0.75, 1].map(p => ({
    y: padT + p * (h - padT - padB),
    v: max * (1 - p),
  }));

  const { hover, onMove, onLeave } = useChartHover(n, padL, padR, w);

  return (
    <div className="chart-wrap" style={{ height }} onMouseMove={onMove} onMouseLeave={onLeave}>
      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="chart-svg">
        {grid.map((g, i) => (
          <line key={i} x1={padL} y1={g.y} x2={w - padR} y2={g.y} stroke="var(--border)" strokeWidth="0.15" vectorEffect="non-scaling-stroke" />
        ))}
        {paths.map((p, i) => (
          <path key={i} d={p.d} fill={p.color} opacity={hover ? 0.7 : 0.85} />
        ))}
        {hover && (
          <g>
            <line x1={xAt(hover.idx)} y1={padT} x2={xAt(hover.idx)} y2={h - padB} stroke="var(--fg)" strokeWidth="0.3" vectorEffect="non-scaling-stroke" strokeDasharray="1 1"/>
            {series.map((s, si) => (
              <circle key={si} cx={xAt(hover.idx)} cy={yAt(stacks[hover.idx][si][1])} r="0.8" fill={s.color} stroke="var(--bg-card)" strokeWidth="0.4" vectorEffect="non-scaling-stroke"/>
            ))}
          </g>
        )}
      </svg>
      <div className="chart-y-axis">
        {grid.map((g, i) => (
          <div key={i} className="chart-y-tick" style={{ top: `${(g.y / h) * 100}%` }}>
            {formatY ? formatY(g.v) : APP_DATA.fmtShort(g.v)}
          </div>
        ))}
      </div>
      <div className="chart-x-axis">
        {labels.map((l, i) => (
          <div key={i} className="chart-x-tick">{l}</div>
        ))}
      </div>
      {hover && labels[hover.idx] !== undefined && (
        <ChartTooltip x={hover.mouseX} y={hover.mouseY - 20} containerWidth={hover.containerWidth}>
          <div className="chart-tip-h">{labels[hover.idx]}</div>
          <div className="chart-tip-total">
            <span>Toplam</span>
            <span className="mono">{formatTooltipValue ? formatTooltipValue(totals[hover.idx]) : "₺" + APP_DATA.fmt(totals[hover.idx])}</span>
          </div>
          {series.map((s, si) => (
            <div key={si} className="chart-tip-row">
              <span className="chart-tip-dot" style={{background: s.color}}/>
              <span className="chart-tip-l">{s.label}</span>
              <span className="chart-tip-v mono">{formatTooltipValue ? formatTooltipValue(s.values[hover.idx]) : "₺" + APP_DATA.fmt(s.values[hover.idx])}</span>
            </div>
          ))}
        </ChartTooltip>
      )}
    </div>
  );
}

// ── Multi-line chart with overlays + hover ─────
function MultiLineChart({ series, labels, height = 240, formatY, showZero = true, formatTooltipValue }) {
  const w = 100, h = 100;
  const padL = 8, padR = 2, padT = 4, padB = 10;
  const all = series.flatMap(s => s.values).filter(v => Number.isFinite(v));
  const max = Math.max(...all);
  const min = showZero ? Math.min(0, ...all) : Math.min(...all);
  const range = max - min || 1;
  const xAt = (i) => padL + (labels.length === 1 ? 0 : i / (labels.length - 1)) * (w - padL - padR);
  const yAt = (v) => padT + (1 - (v - min) / range) * (h - padT - padB);
  const grid = [0, 0.25, 0.5, 0.75, 1].map(p => ({
    y: padT + p * (h - padT - padB),
    v: min + range * (1 - p),
  }));

  const { hover, onMove, onLeave } = useChartHover(labels.length, padL, padR, w);

  return (
    <div className="chart-wrap" style={{ height }} onMouseMove={onMove} onMouseLeave={onLeave}>
      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="chart-svg">
        {grid.map((g, i) => (
          <line key={i} x1={padL} y1={g.y} x2={w - padR} y2={g.y} stroke="var(--border)" strokeWidth="0.15" vectorEffect="non-scaling-stroke" />
        ))}
        {series.map((s, si) => {
          const pts = s.values.map((v, i) => Number.isFinite(v) ? `${xAt(i)},${yAt(v)}` : null).filter(Boolean);
          if (pts.length < 2) return null;
          const path = `M${pts.join(" L")}`;
          return (
            <g key={si}>
              {s.fill && <path d={`${path} L${xAt(s.values.length - 1)},${yAt(min)} L${xAt(0)},${yAt(min)} Z`} fill={s.color} opacity="0.1" />}
              <path d={path} stroke={s.color} strokeWidth={s.strokeWidth || 1.4} strokeDasharray={s.dashed ? "2 2" : null} fill="none" vectorEffect="non-scaling-stroke" />
            </g>
          );
        })}
        {hover && (
          <g>
            <line x1={xAt(hover.idx)} y1={padT} x2={xAt(hover.idx)} y2={h - padB} stroke="var(--fg-3)" strokeWidth="0.3" vectorEffect="non-scaling-stroke" strokeDasharray="1 1"/>
            {series.filter(s => !s.dashed).map((s, si) => (
              Number.isFinite(s.values[hover.idx]) ? <circle key={si} cx={xAt(hover.idx)} cy={yAt(s.values[hover.idx])} r="0.9" fill={s.color} stroke="var(--bg-card)" strokeWidth="0.4" vectorEffect="non-scaling-stroke"/> : null
            ))}
          </g>
        )}
      </svg>
      <div className="chart-y-axis">
        {grid.map((g, i) => (
          <div key={i} className="chart-y-tick" style={{ top: `${(g.y / h) * 100}%` }}>
            {formatY ? formatY(g.v) : APP_DATA.fmtShort(g.v)}
          </div>
        ))}
      </div>
      <div className="chart-x-axis">
        {labels.map((l, i) => (
          <div key={i} className="chart-x-tick">{l}</div>
        ))}
      </div>
      {hover && labels[hover.idx] !== undefined && (
        <ChartTooltip x={hover.mouseX} y={hover.mouseY - 20} containerWidth={hover.containerWidth}>
          <div className="chart-tip-h">{labels[hover.idx]}</div>
          {series.filter(s => !s.dashed && s.name).map((s, si) => (
            <div key={si} className="chart-tip-row">
              <span className="chart-tip-dot" style={{background: s.color}}/>
              <span className="chart-tip-l">{s.name}</span>
              <span className="chart-tip-v mono">{formatTooltipValue ? formatTooltipValue(s.values[hover.idx]) : "₺" + APP_DATA.fmt(s.values[hover.idx])}</span>
            </div>
          ))}
        </ChartTooltip>
      )}
    </div>
  );
}

// ── Heatmap calendar with hover ─────────────────
function HeatmapCalendar({ days, max, color = "var(--accent)" }) {
  const [hover, setHover] = useState(null);
  if (!days.length) return null;
  const start = new Date(days[0].date);
  const startDow = (start.getDay() + 6) % 7;
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (const d of days) cells.push(d);

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) {
    weeks.push(cells.slice(i, i + 7));
  }

  const heatColor = (v) => {
    if (!v) return "var(--bg-elev-2)";
    const intensity = Math.min(1, v / max);
    return `color-mix(in oklch, var(--bg-elev-2), ${color} ${Math.round(intensity * 100)}%)`;
  };

  const tr = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
  const months = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];

  const monthCols = [];
  let lastMonth = -1;
  weeks.forEach((week, wi) => {
    const first = week.find(c => c);
    if (first) {
      const m = new Date(first.date).getMonth();
      if (m !== lastMonth) {
        monthCols.push({ wi, label: months[m] });
        lastMonth = m;
      }
    }
  });

  return (
    <div className="hmap" onMouseLeave={()=>setHover(null)}>
      <div className="hmap-months" style={{ gridTemplateColumns: `repeat(${weeks.length}, 1fr)` }}>
        {weeks.map((_, wi) => {
          const lbl = monthCols.find(m => m.wi === wi)?.label;
          return <div key={wi} className="hmap-month">{lbl || ""}</div>;
        })}
      </div>
      <div className="hmap-body">
        <div className="hmap-dow">
          {tr.map((d, i) => <div key={i} className="hmap-dow-l">{i % 2 === 0 ? d : ""}</div>)}
        </div>
        <div className="hmap-grid" style={{ gridTemplateColumns: `repeat(${weeks.length}, 1fr)` }}>
          {weeks.map((week, wi) => (
            <div key={wi} className="hmap-week">
              {Array.from({ length: 7 }, (_, di) => {
                const cell = week[di];
                if (!cell) return <div key={di} className="hmap-cell hmap-cell-empty"/>;
                const d = new Date(cell.date);
                const isHover = hover && hover.date === cell.date;
                return (
                  <div
                    key={di}
                    className={`hmap-cell ${isHover ? "hmap-cell-hover" : ""}`}
                    style={{ background: heatColor(cell.value) }}
                    onMouseEnter={(e)=>{
                      const grid = e.currentTarget.closest('.hmap').getBoundingClientRect();
                      const cellRect = e.currentTarget.getBoundingClientRect();
                      setHover({ date: cell.date, value: cell.value, x: cellRect.left - grid.left + cellRect.width/2, y: cellRect.top - grid.top });
                    }}
                  />
                );
              })}
            </div>
          ))}
        </div>
      </div>
      <div className="hmap-legend">
        <span>Az</span>
        {[0.1, 0.3, 0.5, 0.7, 0.9].map((v, i) => (
          <span key={i} className="hmap-cell" style={{ background: heatColor(v * max) }}/>
        ))}
        <span>Çok</span>
      </div>
      {hover && (
        <div className="chart-tip hmap-tip" style={{ left: hover.x, top: hover.y - 8 }}>
          <div className="chart-tip-h">
            {new Date(hover.date).getDate()} {months[new Date(hover.date).getMonth()]} {new Date(hover.date).getFullYear()}
          </div>
          <div className="chart-tip-row">
            <span className="chart-tip-l">{tr[(new Date(hover.date).getDay() + 6) % 7]}</span>
            <span className="chart-tip-v mono">{hover.value > 0 ? "₺" + APP_DATA.fmt(hover.value) : "Harcama yok"}</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Score ring (gauge) ─────────────────────────
function ScoreRing({ score, color = "var(--accent)", size = 150, label, sublabel }) {
  const r = size / 2 - 12;
  const c = size / 2;
  const C = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(100, score));
  const off = C * (1 - pct / 100);
  return (
    <div className="score-ring" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={c} cy={c} r={r} fill="none" stroke="var(--bg-elev-2)" strokeWidth="11" />
        <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth="11"
          strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
          transform={`rotate(-90 ${c} ${c})`} style={{ transition: "stroke-dashoffset 0.5s ease" }} />
      </svg>
      <div className="score-ring-center">
        <div className="score-ring-val" style={{ color }}>{Math.round(score)}</div>
        {label && <div className="score-ring-label">{label}</div>}
        {sublabel && <div className="score-ring-sub">{sublabel}</div>}
      </div>
    </div>
  );
}

<script type="text/babel">
// Views: Dashboard, Transactions, Budget, Reports, Debts
// ────────────────────────────────────────────────────────

const { useState: useStateV, useMemo: useMemoV, useEffect: useEffectV } = React;

const TR_MONTHS = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
const TR_MONTHS_SHORT = ["Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"];

// "YYYY-MM-DD" anahtarını YEREL tarih olarak ayrıştır (UTC kayması yok); tam ISO ise olduğu gibi
function parseLocalDate(s) {
  if (typeof s === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
  }
  return new Date(s);
}
function fmtDate(iso) {
  const d = parseLocalDate(iso);
  return `${d.getDate()} ${TR_MONTHS_SHORT[d.getMonth()]}`;
}
function fmtDateLong(iso) {
  const d = parseLocalDate(iso);
  return `${d.getDate()} ${TR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function relDay(iso) {
  const d = parseLocalDate(iso);
  const today = appToday();
  const a = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const b = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diff = Math.round((b - a) / 86400000);
  if (diff === 0) return "Bugün";
  if (diff === 1) return "Dün";
  if (diff > 1 && diff < 7) return `${diff} gün önce`;
  return fmtDate(iso);
}

// Bir işlem transfer/kart-ödeme bacağı mı? (global isTransferLeg data.js'te)
// Transfer/kart-ödeme çiftlerini tek satıra indir (çift kayıt görünmesin, gelir/gider şişmesin)
function collapseTransfers(items, accounts) {
  const used = new Set();
  const result = [];
  const findLeg = (ts, dir) => items.find((t) => !used.has(t.id) && new RegExp(`-${dir}-${ts}$`).test(t.id));
  for (const t of items) {
    if (used.has(t.id)) continue;
    const m = t.id && t.id.match(/^tx-(?:cardpay-|cardadv-)?(out|in)-(\d+)$/);
    if (m) {
      const dir = m[1], ts = m[2];
      const other = findLeg(ts, dir === "out" ? "in" : "out");
      if (other) {
        const outLeg = dir === "out" ? t : other;
        const inLeg = dir === "out" ? other : t;
        used.add(t.id); used.add(other.id);
        const fromAcc = (accounts || []).find((a) => a.id === outLeg.account);
        const toAcc = (accounts || []).find((a) => a.id === inLeg.account);
        result.push({
          kind: "transfer",
          id: outLeg.id,
          pairIds: [outLeg.id, inLeg.id],
          name: `${fromAcc?.name || "?"} → ${toAcc?.name || "?"}`,
          note: outLeg.note || "Transfer",
          amount: Math.abs(outLeg.amount),
          date: outLeg.date,
          category: outLeg.category || "diger",
        });
        continue;
      }
    }
    result.push(t);
  }
  return result;
}

// Derive monthly income/expense/net series from a transaction list
function deriveMonthly(transactions, monthsBack, refDate) {
  const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(refDate.getFullYear(), refDate.getMonth() - i, 1);
    const start = d;
    const end = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
    const txs = transactions.filter((t) => {
      const dt = new Date(t.date);
      return dt >= start && dt <= end;
    });
    // Gelir/gider: transfer ve borç ödemelerini hariç tut (kategori bazlı temiz kalsın)
    const income = txs.filter((t) => !isTransferLeg(t) && !isDebtPayment(t) && t.amount > 0).reduce((s, t) => s + t.amount, 0);
    const expense = -txs.filter((t) => !isTransferLeg(t) && !isDebtPayment(t) && t.amount < 0).reduce((s, t) => s + t.amount, 0);
    // Borç/kart anapara ödemeleri: gider değil ama nakitten çıktı → net birikimden düşülür
    const debtPaid = txs.filter((t) => isDebtPayment(t)).reduce((s, t) => s + Math.abs(t.amount), 0);
    out.push({ label: TR_MONTHS_SHORT[d.getMonth()], year: d.getFullYear(), month: d.getMonth(), income, expense, debtPaid, net: income - expense - debtPaid });
  }
  return out;
}

// Cumulative savings curve from monthly net (starts at 0, honest about period)
function deriveSavingsCurve(monthly) {
  let running = 0;
  return monthly.map((m) => { running += m.net; return { label: m.label, value: running }; });
}

// ════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════
function DashboardView({ ctx }) {
  const { showBalances, setShowBalances, onNavigate, onAddTransaction, transactions, accounts, scheduled } = ctx;
  const realTx = transactions.filter((t) => !isTransferLeg(t));
  const d = { ...APP_DATA, transactions: realTx, accounts };
  const today = appToday();

  // current month
  const curMonth = monthRange(today);
  const monthTx = transactions.filter((t) => {
    const dt = new Date(t.date);
    return dt >= curMonth.start && dt <= curMonth.end;
  });
  const monthIn = monthTx.filter((t) => !isTransferLeg(t) && !isDebtPayment(t) && t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const monthOut = -monthTx.filter((t) => !isTransferLeg(t) && !isDebtPayment(t) && t.amount < 0).reduce((s, t) => s + t.amount, 0);
  const monthDebtPaid = monthTx.filter((t) => isDebtPayment(t)).reduce((s, t) => s + Math.abs(t.amount), 0);
  const monthNet = monthIn - monthOut - monthDebtPaid;

  // Previous month for deltas
  const prevMonth = new Date(today.getFullYear(), today.getMonth() - 1, 15);
  const prevRange = monthRange(prevMonth);
  const prevMonthTx = transactions.filter((t) => {
    const dt = new Date(t.date);
    return dt >= prevRange.start && dt <= prevRange.end;
  });
  const prevIn = prevMonthTx.filter((t) => !isTransferLeg(t) && !isDebtPayment(t) && t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const prevOut = -prevMonthTx.filter((t) => !isTransferLeg(t) && !isDebtPayment(t) && t.amount < 0).reduce((s, t) => s + t.amount, 0);
  const inDelta = prevIn ? ((monthIn - prevIn) / prevIn) * 100 : null;
  const outDelta = prevOut ? ((monthOut - prevOut) / prevOut) * 100 : null;
  const fmtTrend = (v) => v === null ? "Yeni başlangıç" : `${v >= 0 ? "+" : ""}%${v.toFixed(1)} önceki aya göre`;

  const totalCash = d.accounts.filter((a) => a.balance > 0).reduce((s, a) => s + a.balance, 0);
  const ccDebt = -d.accounts.filter((a) => a.balance < 0).reduce((s, a) => s + a.balance, 0);
  const liquidNet = totalCash - ccDebt;

  // category breakdown this month (expenses)
  const byCat = {};
  monthTx.forEach((t) => {
    if (t.amount < 0 && !isTransferLeg(t) && !isDebtPayment(t)) {
      byCat[t.category] = (byCat[t.category] || 0) + -t.amount;
    }
  });
  const catSegs = Object.entries(byCat).
  map(([id, v]) => {
    const c = d.categories.find((x) => x.id === id);
    return { label: c.label, value: v, color: c.color, id };
  }).
  sort((a, b) => b.value - a.value);

  const top5 = catSegs.slice(0, 5);

  // Derived monthly series + cumulative savings curve from live transactions
  const monthlySeries = deriveMonthly(transactions, 12, today);
  const savingsCurve = deriveSavingsCurve(monthlySeries);
  const totalSaved = savingsCurve[savingsCurve.length - 1]?.value || 0;

  // recent transactions (5)
  const recent = d.transactions.slice(0, 6);

  // Upcoming scheduled payments (next 14 days)
  const todayKey = localYMD(today);
  const in14 = new Date(today); in14.setDate(today.getDate() + 14);
  const in14Key = localYMD(in14);
  const upcoming = (scheduled || [])
    .filter((s) => s.active && s.nextDate >= todayKey && s.nextDate <= in14Key)
    .sort((a, b) => a.nextDate.localeCompare(b.nextDate))
    .map((s) => {
      let amt = s.amount;
      if (s.kind === "card" && s.payMode && s.payMode !== "fixed") {
        const c = accounts.find((a) => a.id === s.cardId);
        const owed = c ? Math.max(0, -c.balance) : 0;
        amt = -(s.payMode === "full" ? owed : (owed > 0 ? Math.max(Math.round(owed * 0.20), Math.min(owed, 100)) : 0));
      }
      return { date: s.nextDate, name: s.name, note: s.autopay ? "Otomatik" : "Manuel", amount: amt, category: s.category };
    });

  return (
    <div className="view view-dash">
      {/* Greeting + actions */}
      <div className="page-head">
        <div>
          <h1 className="page-title">Merhaba 👋</h1>
          <p className="page-sub">İşte bu ayki finansal durumun · {TR_MONTHS[today.getMonth()]} {today.getFullYear()}</p>
        </div>
        <div className="page-actions">
          <button className="btn btn-ghost btn-md" onClick={() => setShowBalances(!showBalances)}>
            <Icon name={showBalances ? "eye" : "eyeOff"} size={16} />
            {showBalances ? "Bakiyeleri gizle" : "Bakiyeleri göster"}
          </button>
          <button className="btn btn-primary btn-md" onClick={onAddTransaction}>
            <Icon name="plus" size={16} />
            İşlem ekle
          </button>
        </div>
      </div>

      {/* Hero stats */}
      <div className="dash-hero">
        <div className="hero-main">
          <div className="hero-label">Toplam likit varlık</div>
          <div className="hero-amount">
            <Money value={liquidNet} size="xl" sign="neutral" hide={!showBalances} />
          </div>
          <div className="hero-meta">
            {d.accounts.length > 0 ? (
              <>
                {monthNet !== 0 && (
                  <span className={`chip ${monthNet >= 0 ? "chip-pos" : "chip-neg"}`}>
                    <Icon name={monthNet >= 0 ? "arrowUp" : "arrowDown"} size={12} />
                    {monthNet >= 0 ? "+" : "−"}₺{APP_DATA.fmtShort(Math.abs(monthNet))} bu ay
                  </span>
                )}
                <span className="hero-sub">Nakit ₺{APP_DATA.fmtShort(totalCash)} − kart borcu ₺{APP_DATA.fmtShort(ccDebt)}</span>
              </>
            ) : (
              <span className="hero-sub">Başlamak için bir hesap ekle</span>
            )}
          </div>
          <div className="hero-spark">
            <Sparkline values={savingsCurve.map((x) => x.value)} color="var(--accent)" height={56} />
          </div>
        </div>

        <div className="hero-grid">
          <div className="hero-mini">
            <div className="hero-mini-icon" style={{ background: "rgba(34,197,94,0.12)", color: "var(--pos)" }}>
              <Icon name="arrowDown" size={16} />
            </div>
            <div className="hero-mini-label">Bu ay gelir</div>
            <div className="hero-mini-val"><Money value={monthIn} sign="neutral" hide={!showBalances} /></div>
            <div className="hero-mini-trend pos">{fmtTrend(inDelta)}</div>
          </div>
          <div className="hero-mini">
            <div className="hero-mini-icon" style={{ background: "rgba(239,68,68,0.12)", color: "var(--neg)" }}>
              <Icon name="arrowUp" size={16} />
            </div>
            <div className="hero-mini-label">Bu ay gider</div>
            <div className="hero-mini-val"><Money value={monthOut} sign="neutral" hide={!showBalances} /></div>
            <div className="hero-mini-trend neg">{fmtTrend(outDelta)}</div>
          </div>
          <div className="hero-mini">
            <div className="hero-mini-icon" style={{ background: "rgba(14,165,233,0.12)", color: "#0ea5e9" }}>
              <Icon name="sparkles" size={16} />
            </div>
            <div className="hero-mini-label">Bu ay net nakit akışı</div>
            <div className="hero-mini-val"><Money value={monthNet} sign="neutral" hide={!showBalances} /></div>
            <div className={`hero-mini-trend ${monthNet >= 0 ? "pos" : "neg"}`}>{monthIn > 0 ? `Gelir − gider − borç ödemesi` : "—"}</div>
          </div>
        </div>
      </div>

      {/* Accounts */}
      <Card
        title="Hesaplar ve kartlar"
        action={<a className="link" onClick={() => onNavigate("hesaplar")}>Tümünü yönet <Icon name="chevronRight" size={14} /></a>}>
        
        <div className="accounts-row">
          {d.accounts.map((a) =>
          <div key={a.id} className="acc-card">
              <div className="acc-card-h">
                <div className="acc-dot" style={{ background: a.color }} />
                <div className="acc-name">
                  <div className="acc-name-t">{a.name}</div>
                  <div className="acc-name-st">{a.type}</div>
                </div>
                <Icon name={a.type.includes("Kart") ? "card" : a.type.includes("Cüzdan") ? "wallet" : "wallet"} size={16} />
              </div>
              <div className="acc-num">{a.number}</div>
              <div className="acc-bal">
                <Money value={a.balance} sign={a.balance < 0 ? "auto" : "neutral"} hide={!showBalances} />
              </div>
              {a.limit &&
            <>
                  <div className="acc-limit-row">
                    <span>Kullanılan</span>
                    <span>%{Math.round(-a.balance / a.limit * 100)}</span>
                  </div>
                  <Progress value={-a.balance} max={a.limit} color={a.color} height={4} />
                </>
            }
            </div>
          )}
          <button className="acc-card acc-card-add" onClick={() => onNavigate("hesaplar")}>
            <Icon name="plus" size={22} />
            <span>Hesap ekle</span>
          </button>
        </div>
      </Card>

      {/* Two-col: cashflow + breakdown */}
      <div className="grid-2col">
        <Card
          title="Gelir / gider akışı"
          subtitle="Son 12 ay"
          action={
          <div className="legend">
              <span className="legend-item"><span className="legend-dot" style={{ background: "var(--pos)" }} />Gelir</span>
              <span className="legend-item"><span className="legend-dot" style={{ background: "var(--neg)" }} />Gider</span>
            </div>
          }>
          
          <BarChart
            data={monthlySeries.map((m) => ({
              label: m.label,
              values: [m.income, m.expense],
              colors: ["var(--pos)", "var(--neg)"]
            }))}
            height={280}
            seriesLabels={["Gelir", "Gider"]} />
          
        </Card>

        <Card
          title="Bu ay harcama dağılımı"
          subtitle={`Toplam ${APP_DATA.fmt(monthOut)} ₺`}>
          
          <div className="donut-row">
            <Donut
              segments={catSegs}
              size={200}
              thickness={26}
              center={
              <div className="donut-center-inner">
                  <div className="donut-c-label">Toplam</div>
                  <div className="donut-c-val">₺{APP_DATA.fmtShort(monthOut)}</div>
                </div>
              } />
            
            <ul className="cat-list">
              {top5.map((s) =>
              <li key={s.id}>
                  <span className="cat-dot" style={{ background: s.color }} />
                  <span className="cat-name">{s.label}</span>
                  <span className="cat-val mono">₺{APP_DATA.fmt(s.value)}</span>
                  <span className="cat-pct">%{Math.round(s.value / monthOut * 100)}</span>
                </li>
              )}
            </ul>
          </div>
        </Card>
      </div>

      {/* Recent + upcoming */}
      <div className="grid-2col">
        <Card
          title="Son işlemler"
          action={<a className="link" onClick={() => onNavigate("islemler")}>Tümünü gör <Icon name="chevronRight" size={14} /></a>}
          padded={false}>
          
          <ul className="tx-list">
            {recent.map((t) => <TxRow key={t.id} t={t} hide={!showBalances} />)}
          </ul>
        </Card>

        <Card title="Yaklaşan ödemeler" subtitle="Önümüzdeki 14 gün" padded={false}>
          <ul className="tx-list">
            {upcoming.map((t, i) =>
            <li key={i} className="tx-row">
                <div className="tx-date-col">
                  <div className="tx-day">{new Date(t.date).getDate()}</div>
                  <div className="tx-mon">{TR_MONTHS_SHORT[new Date(t.date).getMonth()]}</div>
                </div>
                <div className="tx-main">
                  <div className="tx-name">{t.name}</div>
                  <div className="tx-meta"><CategoryPill catId={t.category} /> <span className="dot-sep">·</span> {t.note}</div>
                </div>
                <div className="tx-amt"><Money value={t.amount} sign="auto" hide={!showBalances} /></div>
              </li>
            )}
          </ul>
          <div className="card-foot">
            <div className="upc-total">
              <span>14 günlük toplam</span>
              <Money value={upcoming.reduce((s, x) => s + x.amount, 0)} sign="auto" hide={!showBalances} />
            </div>
          </div>
        </Card>
      </div>
    </div>);

}

function monthRange(d) {
  const start = new Date(d.getFullYear(), d.getMonth(), 1);
  const end = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
  return { start, end };
}

function TxRow({ t, hide, dense }) {
  const cat = APP_DATA.categories.find((c) => c.id === t.category);
  return (
    <li className={`tx-row ${dense ? "tx-row-dense" : ""}`}>
      <div className="tx-icon-col" style={{ background: `${cat.color}22`, color: cat.color }}>
        <span className="tx-icon-letter">{t.name[0]}</span>
      </div>
      <div className="tx-main">
        <div className="tx-name">{t.name}</div>
        <div className="tx-meta">
          <CategoryPill catId={t.category} />
          <span className="dot-sep">·</span>
          {relDay(t.date)}
        </div>
      </div>
      <div className="tx-amt">
        <Money value={t.amount} sign="auto" hide={hide} />
      </div>
    </li>);

}
