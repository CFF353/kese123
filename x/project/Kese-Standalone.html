<script type="text/babel">
// Kese+ AI — Doğal dil soru-cevap + otomatik aylık CFO raporu
// Sağlayıcı: önizlemede window.claude; dışarıda kullanıcının kendi Anthropic API anahtarı (Ayarlar'dan girilir)
// ─────────────────────────────────────────────────────────

// ── AI sağlayıcı katmanı ──
// 1) window.claude varsa (canlı önizleme) onu kullanır
// 2) Yoksa localStorage'daki "kese_api_key" ile doğrudan Anthropic API'ye gider
window.keseAI = {
  hasProvider() {
    return !!(window.claude && window.claude.complete) || !!localStorage.getItem("kese_api_key");
  },
  hasOwnKey() { return !!localStorage.getItem("kese_api_key"); },
  async complete(arg) {
    const messages = typeof arg === "string" ? [{ role: "user", content: arg }] : (arg.messages || []);
    if (window.claude && window.claude.complete) {
      return await window.claude.complete({ messages });
    }
    const key = localStorage.getItem("kese_api_key");
    if (!key) throw new Error("no-key");
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 1500, messages }),
    });
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) throw new Error("bad-key");
      if (res.status === 429) throw new Error("rate-limit");
      let detail = "";
      try { detail = ((await res.json()).error || {}).message || ""; } catch (e) {}
      const err = new Error("api-error");
      err.detail = `HTTP ${res.status}${detail ? " — " + detail : ""}`;
      throw err;
    }
    const data = await res.json();
    return (data.content || []).map((c) => c.text || "").join("");
  },
};
window.keseAIErrorText = (e) => {
  const m = e && e.message;
  if (m === "no-key") return "AI için Ayarlar → \"Yapay zekâ anahtarı\" bölümünden kendi Anthropic API anahtarını gir (console.anthropic.com'dan alınır). Anahtar yalnızca bu cihazda saklanır.";
  if (m === "bad-key") return "API anahtarı geçersiz veya yetkisiz — Ayarlar'dan kontrol et.";
  if (m === "rate-limit") return "Hız sınırına takıldın — biraz bekleyip tekrar dene.";
  if (m === "api-error" && e.detail) return `Bir hata oluştu: ${e.detail}`;
  return "Bir hata oluştu, tekrar dener misin?";
};

const { useState: useStateAI, useEffect: useEffectAI, useRef: useRefAI } = React;

// Markdown render: başlık, kalın, italik, madde, çizgi, tablo
function renderInline(text, keyBase) {
  // **kalın**, *italik*, `kod`
  const parts = [];
  const re = /(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g;
  let last = 0, m, i = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push(<React.Fragment key={keyBase + "-t" + i}>{text.slice(last, m.index)}</React.Fragment>);
    const s = m[0];
    if (s.startsWith("**")) parts.push(<strong key={keyBase + "-b" + i}>{s.slice(2, -2)}</strong>);
    else if (s.startsWith("`")) parts.push(<code key={keyBase + "-c" + i} className="ai-code">{s.slice(1, -1)}</code>);
    else parts.push(<em key={keyBase + "-i" + i}>{s.slice(1, -1)}</em>);
    last = m.index + s.length; i++;
  }
  if (last < text.length) parts.push(<React.Fragment key={keyBase + "-tend"}>{text.slice(last)}</React.Fragment>);
  return parts;
}

function renderRich(text) {
  const rawLines = (text || "").split("\n");
  const out = [];
  let tableBuf = [];
  const flushTable = (key) => {
    if (!tableBuf.length) return;
    const rows = tableBuf.map((r) => r.replace(/^\||\|$/g, "").split("|").map((c) => c.trim()));
    const isSep = (r) => r.every((c) => /^:?-+:?$/.test(c));
    const header = rows[0];
    const body = rows.slice(1).filter((r) => !isSep(r));
    out.push(
      <div key={"tbl" + key} className="ai-table-wrap"><table className="ai-table">
        <thead><tr>{header.map((c, i) => <th key={i}>{renderInline(c, "h" + key + i)}</th>)}</tr></thead>
        <tbody>{body.map((r, ri) => <tr key={ri}>{r.map((c, ci) => <td key={ci}>{renderInline(c, "d" + key + ri + ci)}</td>)}</tr>)}</tbody>
      </table></div>
    );
    tableBuf = [];
  };
  rawLines.forEach((raw, li) => {
    const line = raw.trim();
    if (/^\|.*\|/.test(line)) { tableBuf.push(line); return; }
    flushTable(li);
    if (!line) return;
    if (/^#{1,6}\s/.test(line)) { const t = line.replace(/^#{1,6}\s/, ""); out.push(<div key={li} className="ai-h">{renderInline(t, "hh" + li)}</div>); return; }
    if (/^([-*_])\1{2,}$/.test(line)) { out.push(<hr key={li} className="ai-hr" />); return; }
    if (/^\d+\.\s/.test(line)) { const t = line.replace(/^(\d+)\.\s/, ""); const n = line.match(/^(\d+)\./)[1]; out.push(<div key={li} className="ai-li"><span className="ai-li-num">{n}.</span><span>{renderInline(t, "n" + li)}</span></div>); return; }
    if (/^[-•*]\s/.test(line)) { const t = line.replace(/^[-•*]\s+/, ""); out.push(<div key={li} className="ai-li"><span className="ai-li-dot">•</span><span>{renderInline(t, "u" + li)}</span></div>); return; }
    out.push(<p key={li}>{renderInline(line, "p" + li)}</p>);
  });
  flushTable("end");
  return out;
}

// Kullanıcının finansal durumunu kompakt, AI'ya verilebilir özete çevir
function buildFinanceContext(ctx) {
  const { accounts, debts, transactions, holdings = [], goals = [], snapshots = [], budgets = [], scheduled = [] } = ctx;
  const fmt = (n) => Math.round(n).toLocaleString("tr-TR");
  const today = appToday();
  const isLeg = (t) => isTransferLeg(t);
  const isDebtPay = (t) => isDebtPayment(t);

  const cashAccts = accounts.filter((a) => !a.type.includes("Kart"));
  const cardAccts = accounts.filter((a) => a.type.includes("Kart"));
  const liquidCash = cashAccts.reduce((s, a) => s + Math.max(0, a.balance), 0);
  const cardDebt = -cardAccts.reduce((s, a) => s + Math.min(0, a.balance), 0);
  const cardLimit = cardAccts.reduce((s, a) => s + (a.limit || 0), 0);
  const loanDebt = debts.reduce((s, d) => s + (d.remaining || 0), 0);
  const totalDebt = cardDebt + loanDebt;
  const netWorth = liquidCash - totalDebt;

  // Son 6 ay gelir/gider
  const months = [];
  const TRM = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const s = new Date(d.getFullYear(), d.getMonth(), 1);
    const e = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
    const txs = transactions.filter((t) => { const dt = new Date(t.date); return dt >= s && dt <= e; });
    const inc = txs.filter((t) => !isLeg(t) && !isDebtPay(t) && t.amount > 0).reduce((a, t) => a + t.amount, 0);
    const exp = -txs.filter((t) => !isLeg(t) && !isDebtPay(t) && t.amount < 0).reduce((a, t) => a + t.amount, 0);
    months.push({ name: `${TRM[d.getMonth()]} ${d.getFullYear()}`, inc, exp, net: inc - exp });
  }

  // Bu ay kategori kırılımı
  const mStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const catMap = {};
  transactions.filter((t) => new Date(t.date) >= mStart && !isLeg(t) && !isDebtPay(t) && t.amount < 0)
    .forEach((t) => { const c = APP_DATA.categories.find((x) => x.id === t.category); catMap[c?.label || t.category] = (catMap[c?.label || t.category] || 0) + -t.amount; });
  const catLines = Object.entries(catMap).sort((a, b) => b[1] - a[1]).map(([k, v]) => `  ${k}: ${fmt(v)} TL`).join("\n");

  const incMonths = Math.max(1, months.filter((mm) => mm.inc > 0).length);
  const actMonths = Math.max(1, months.filter((mm) => mm.inc > 0 || mm.exp > 0).length);
  const monthlyIncome = months.reduce((s, mm) => s + mm.inc, 0) / incMonths;
  const monthlyExpense = months.reduce((s, mm) => s + mm.exp, 0) / actMonths;
  const cardInterestMo = cardAccts.reduce((s, a) => s + Math.max(0, -a.balance) * ((a.rate || 4.25) / 100), 0);
  const loanInterestMo = debts.reduce((s, d) => s + (d.remaining || 0) * ((d.rate || 0) / 100), 0);
  const carryingMo = cardInterestMo + loanInterestMo;
  const emergencyMonths = monthlyExpense ? liquidCash / monthlyExpense : 0;

  // ── Profesyonel finansal oranlar ──
  const savingsRate = monthlyIncome ? (monthlyIncome - monthlyExpense) / monthlyIncome * 100 : 0;
  const monthlyDebtService = cardDebt * 0.20 + debts.reduce((s, d) => s + (d.monthly || 0), 0);
  const dsr = monthlyIncome ? monthlyDebtService / monthlyIncome * 100 : 0; // borç servis oranı
  const cardUtil = cardLimit ? cardDebt / cardLimit * 100 : 0;
  const leverage = liquidCash > 0 ? totalDebt / liquidCash : null; // borç/likit kaldıraç
  const interestCoverage = carryingMo ? monthlyIncome / carryingMo : null; // faiz karşılama
  const expenseRatio = monthlyIncome ? monthlyExpense / monthlyIncome * 100 : 0;
  const monthlyNet = monthlyIncome - monthlyExpense;

  // ── Yatırım portföyü ──
  const pf = holdings.map((h) => {
    const val = h.quantity * h.price, cost = h.quantity * h.avgCost;
    return { name: h.name, type: h.type, val, pl: val - cost, plPct: cost ? (val - cost) / cost * 100 : 0 };
  });
  const pfValue = pf.reduce((s, h) => s + h.val, 0);
  const pfPL = pf.reduce((s, h) => s + h.pl, 0);
  const pfLines = pf.length ? pf.sort((a, b) => b.val - a.val).map((h) => `  ${h.name} (${h.type}): değer ${fmt(h.val)} TL, K/Z ${h.pl >= 0 ? "+" : ""}${fmt(h.pl)} (%${h.plPct.toFixed(1)})`).join("\n") : "  (yok)";

  // ── Hedefler ──
  const goalLines = goals.length ? goals.map((g) => {
    const pct = g.target ? g.saved / g.target * 100 : 0;
    return `  ${g.name}: ${fmt(g.saved)}/${fmt(g.target)} TL (%${pct.toFixed(0)})${g.deadline ? `, hedef ${g.deadline}` : ""}`;
  }).join("\n") : "  (yok)";

  // ── Net değer trendi (snapshot) ──
  const snapSorted = [...snapshots].sort((a, b) => a.ym.localeCompare(b.ym));
  const nwTrend = snapSorted.length >= 2
    ? `İlk kayıt ${snapSorted[0].ym}: ${fmt(snapSorted[0].netWorth)} TL → bugün: ${fmt(netWorth)} TL (${snapSorted.length} aylık kayıt)`
    : "Henüz yeterli geçmiş kayıt yok (trend için en az 2 ay gerekli)";

  const accLines = accounts.map((a) => `  ${a.name} (${a.type}): ${fmt(a.balance)} TL${a.limit ? ` / limit ${fmt(a.limit)}` : ""}`).join("\n");
  const debtLines = debts.map((d) => `  ${d.name}: kalan ${fmt(d.remaining)} TL, aylık taksit ${fmt(d.monthly || 0)}, faiz %${d.rate || 0}/ay`).join("\n");
  const monthLines = months.map((mm) => `  ${mm.name}: gelir ${fmt(mm.inc)}, gider ${fmt(mm.exp)}, net ${fmt(mm.net)}`).join("\n");

  // ── Bu ayın en büyük 5 harcaması ──
  const bigExp = transactions.filter((t) => new Date(t.date) >= mStart && !isLeg(t) && !isDebtPay(t) && t.amount < 0)
    .sort((a, b) => a.amount - b.amount).slice(0, 5)
    .map((t) => `  ${t.name}: ${fmt(-t.amount)} TL (${new Date(t.date).toLocaleDateString("tr-TR")})`).join("\n");

  // ── Kategori bazlı bu ay vs önceki ay sapma (anomali) ──
  const pmStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
  const pmEnd = new Date(today.getFullYear(), today.getMonth(), 0, 23, 59, 59);
  const pmCat = {};
  transactions.filter((t) => { const d = new Date(t.date); return d >= pmStart && d <= pmEnd && !isLeg(t) && !isDebtPay(t) && t.amount < 0; })
    .forEach((t) => { const c = APP_DATA.categories.find((x) => x.id === t.category); pmCat[c?.label || t.category] = (pmCat[c?.label || t.category] || 0) + -t.amount; });
  const anomalies = Object.entries(catMap).map(([k, v]) => {
    const prev = pmCat[k] || 0;
    const chg = prev ? (v - prev) / prev * 100 : (v > 0 ? 100 : 0);
    return { k, v, prev, chg };
  }).filter((a) => Math.abs(a.chg) >= 30 && a.v > 500).sort((a, b) => Math.abs(b.chg) - Math.abs(a.chg)).slice(0, 4);
  const anomalyLines = anomalies.length
    ? anomalies.map((a) => `  ${a.k}: bu ay ${fmt(a.v)} TL, geçen ay ${fmt(a.prev)} TL (${a.chg >= 0 ? "+" : ""}${a.chg.toFixed(0)}%)`).join("\n")
    : "  (belirgin sapma yok)";

  // ── Geçen ay kategori tablosu (tam) ──
  const pmCatLines = Object.entries(pmCat).sort((a, b) => b[1] - a[1]).map(([k, v]) => `  ${k}: ${fmt(v)} TL`).join("\n");

  // ── Bütçe vs gerçekleşen (bu ay) ──
  const budgetLines = (budgets || []).map((b) => {
    const cat = APP_DATA.categories.find((c) => c.id === b.category);
    const spent = catMap[cat?.label || b.category] || 0;
    const pctB = b.limit ? spent / b.limit * 100 : 0;
    return `  ${cat?.label || b.category}: bütçe ${fmt(b.limit)}, harcanan ${fmt(spent)} (%${pctB.toFixed(0)})${pctB > 100 ? " — AŞILDI" : pctB > 85 ? " — sınıra yakın" : ""}`;
  }).join("\n");

  // ── Yaklaşan planlı ödemeler (30 gün) ──
  const in30 = new Date(today); in30.setDate(today.getDate() + 30);
  const in30Key = localYMD(in30);
  const todayK = localYMD(today);
  const schLines = (scheduled || []).filter((s) => s.active && s.nextDate >= todayK && s.nextDate <= in30Key)
    .sort((a, b) => a.nextDate.localeCompare(b.nextDate))
    .map((s) => {
      let amt = s.amount;
      if (s.kind === "card" && s.payMode && s.payMode !== "fixed") {
        const c = accounts.find((a) => a.id === s.cardId);
        const owed = c ? Math.max(0, -c.balance) : 0;
        amt = -(s.payMode === "full" ? owed : (owed > 0 ? Math.max(Math.round(owed * 0.2), Math.min(owed, 100)) : 0));
      }
      return `  ${s.nextDate}: ${s.name} ${amt >= 0 ? "+" : ""}${fmt(amt)} TL (${s.frequency === "monthly" ? "aylık" : s.frequency === "weekly" ? "haftalık" : s.frequency === "yearly" ? "yıllık" : "tek sefer"})`;
    }).join("\n");

  // ── Son işlemler (20 adet, transfer bacakları hariç) ──
  const recentTx = transactions.filter((t) => !isLeg(t))
    .slice(0, 20)
    .map((t) => {
      const c = APP_DATA.categories.find((x) => x.id === t.category);
      return `  ${new Date(t.date).toLocaleDateString("tr-TR")}: ${t.name} ${t.amount >= 0 ? "+" : ""}${fmt(t.amount)} TL [${isDebtPay(t) ? "borç ödemesi" : c?.label || "Diğer"}]`;
    }).join("\n");

  return `KULLANICININ FİNANSAL DURUMU (bugün: ${today.toLocaleDateString("tr-TR")}), tüm tutarlar TL:

═══ BİLANÇO ÖZETİ ═══
- Likit nakit (varlık): ${fmt(liquidCash)}
- Yatırım portföyü değeri: ${fmt(pfValue)}
- Toplam varlık: ${fmt(liquidCash + pfValue)}
- Kredi kartı borcu: ${fmt(cardDebt)}
- Kredi borçları: ${fmt(loanDebt)}
- Toplam yükümlülük: ${fmt(totalDebt)}
- NET DEĞER (özkaynak): ${fmt(liquidCash + pfValue - totalDebt)}

═══ GELİR TABLOSU (aylık ortalama) ═══
- Ortalama aylık gelir: ${fmt(monthlyIncome)}
- Ortalama aylık gider: ${fmt(monthlyExpense)}
- Aylık net (faaliyet farkı): ${fmt(monthlyNet)}
- Aylık faiz yükü (taşıma maliyeti): ${fmt(carryingMo)} (yıllık ${fmt(carryingMo * 12)})

═══ FİNANSAL ORANLAR ═══
- Tasarruf oranı: %${savingsRate.toFixed(1)} (hedef >%20)
- Gider/gelir oranı: %${expenseRatio.toFixed(1)}
- Borç servis oranı (DSR): %${dsr.toFixed(1)} (sağlıklı <%30, riskli >%43)
- Kredi kartı kullanımı: %${cardUtil.toFixed(0)} (ideal <%30)
- Kaldıraç (borç/likit): ${leverage === null ? "∞ (likit yok)" : leverage.toFixed(1) + "x"}
- Faiz karşılama oranı: ${interestCoverage === null ? "—" : interestCoverage.toFixed(1) + "x"}
- Likidite tamponu (acil fon): ${emergencyMonths.toFixed(1)} ay (hedef 3-6 ay)

═══ HESAPLAR ═══
${accLines || "  (yok)"}

═══ KREDİLER & BORÇLAR ═══
${debtLines || "  (yok)"}

═══ YATIRIM PORTFÖYÜ (toplam K/Z: ${pfPL >= 0 ? "+" : ""}${fmt(pfPL)} TL) ═══
${pfLines}

═══ BİRİKİM HEDEFLERİ ═══
${goalLines}

═══ SON 6 AY (gelir/gider/net) ═══
${monthLines}

═══ NET DEĞER TRENDİ ═══
${nwTrend}

═══ BU AY KATEGORİ HARCAMALARI ═══
${catLines || "  (henüz yok)"}

═══ BU AYIN EN BÜYÜK HARCAMALARI ═══
${bigExp || "  (yok)"}

═══ KATEGORİ SAPMALARI (bu ay vs geçen ay, ≥%30 değişim) ═══
${anomalyLines}

═══ GEÇEN AY KATEGORİ HARCAMALARI ═══
${pmCatLines || "  (kayıt yok)"}

═══ BÜTÇE vs GERÇEKLEŞEN (bu ay) ═══
${budgetLines || "  (bütçe tanımlı değil)"}

═══ YAKLAŞAN PLANLI ÖDEMELER (30 gün) ═══
${schLines || "  (yok)"}

═══ SON 20 İŞLEM ═══
${recentTx || "  (yok)"}`;
}

    setThread(history); setQ(""); setLoading(true); setError("");
    try {
      if (!window.keseAI.hasProvider()) throw new Error("no-key");
      const context = buildFinanceContext(ctx);
      const sys = `Sen Kese+ uygulamasının baş ekonomisti ve kişisel finans danışmanısın. Profilin: makroekonomi, kişisel finans, davranışsal ekonomi ve yatırım teorisi konularında derin bilgili; bir bankanın özel bankacılık danışmanı gibi pratik ve net. Kullanıcı kendini "Şahsi A.Ş." olarak yönetiyor.

UZMANLIK & YAKLAŞIM:

KURALLAR:

═══════════ GÜNCEL FİNANSAL VERİLER ═══════════
${context}`;
      const messages = [
        { role: "user", content: sys + "\n\nBu verilere hakimsin. Şimdi kullanıcının sorularını yanıtla. İlk soru aşağıda." },
        { role: "assistant", content: "Anladım, verilerine tümüyle hakimim. Sorunu dinliyorum." },
        ...history.slice(-8),
      ];
      const res = await window.keseAI.complete({ messages });
      setThread((prev) => [...prev, { role: "assistant", content: (res || "").trim() || "Yanıt alınamadı." }]);
    } catch (e) {
      setError(window.keseAIErrorText(e));
      setThread((prev) => prev.filter((_, i) => i !== prev.length - 1 || prev[i].role !== "user" || i < prev.length - 1));
    } finally {
      setLoading(false);
    }
  };

  useEffectAI(() => { if (scrollRef.current) scrollRef.current.scrollIntoView({ block: "nearest" }); }, [thread, loading]);

  return (
    <Card title="Ekonomist danışman" subtitle="Verilerine hakim · sohbet et, takip soruları sor" action={
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

        <span className="ai-badge"><Icon name="sparkles" size={12} />AI</span>
      </div>

      {thread.length === 0 && !loading && (

            <button key={s} className="ai-chip" onClick={() => ask(s)}>{s}</button>
          ))}

      )}

      {(thread.length > 0 || loading || error) && (
        <div className="ai-thread">

          {loading && <div className="ai-loading"><span className="ai-spin ai-spin-dark" />Veriler analiz ediliyor…</div>}

          value={q}

          disabled={loading}
        />
        <button className="btn btn-primary btn-md ai-send" onClick={() => ask()} disabled={loading || !q.trim()}>
          {loading ? <span className="ai-spin" /> : <Icon name="arrowRight" size={16} />}
        </button>
      </div>
    </Card>
  );

function MonthlyCFOReport({ ctx }) {
  const [report, setReport] = useStateAI("");
  const [loading, setLoading] = useStateAI(false);
  const [error, setError] = useStateAI("");
  const today = appToday();
  const TRM = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const monthLabel = `${TRM[today.getMonth()]} ${today.getFullYear()}`;
  const cacheKey = `kese_cfo_report_${today.getFullYear()}_${today.getMonth()}`;
  const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const isMonthEnd = today.getDate() >= daysInMonth - 2; // ayın son 3 günü

  useEffectAI(() => {
    let cached = null;
    try { cached = localStorage.getItem(cacheKey); } catch (e) {}
    if (cached) { setReport(cached); return; }
    // Ay sonuysa ve bu ay için rapor yoksa otomatik üret
    if (isMonthEnd && window.keseAI.hasProvider()) {
      const t = setTimeout(() => generate(true), 400);
      return () => clearTimeout(t);
    }
  }, [cacheKey]);

  const generate = async (auto) => {
    if (loading) return;
    setLoading(true); setError("");

${context}

${monthLabel} YÖNETİCİ ÖZETİ:`;

<script>
// Kese — Firebase kimlik doğrulama + bulut senkronizasyonu
// ─────────────────────────────────────────────────────────
// KURULUM (bir kere):
// 1. console.firebase.google.com → yeni proje oluştur (ör. "kese-app")
// 2. Authentication → Sign-in method → "Email/Password" etkinleştir
// 3. Firestore Database → veritabanı oluştur (production mode) → Rules:
//      rules_version = '2';
//      service cloud.firestore {
//        match /databases/{database}/documents {
//          match /users/{uid} {
//            allow read, write: if request.auth != null && request.auth.uid == uid;
//          }
//        }
//      }
// 4. Project settings → genel → "Web app" ekle → çıkan firebaseConfig objesini
//    aşağıdaki KESE_FIREBASE_CONFIG içine yapıştır.
// Config boş bırakılırsa uygulama tamamen yerel (localStorage) çalışır.

window.KESE_FIREBASE_CONFIG = {
  apiKey: "AIzaSyAN6fYkVLz2AZ5k4P2LInzbNTo7ZqiOKJ4",
  authDomain: "kese-f9af8.firebaseapp.com",
  projectId: "kese-f9af8",
  storageBucket: "kese-f9af8.firebasestorage.app",
  messagingSenderId: "817352388024",
  appId: "1:817352388024:web:96f53e2d263fd86b8db34d"
};

(function () {
  const cfg = window.KESE_FIREBASE_CONFIG || {};
  const enabled = !!cfg.apiKey && !!cfg.projectId;

  const state = {
    enabled,
    ready: false,
    user: null,          // { uid, email }
    syncing: false,
    lastSync: null,
    error: null,
    listeners: new Set(),
  };
  const emit = () => state.listeners.forEach((fn) => { try { fn(); } catch (e) {} });

  window.keseCloud = {
    get enabled() { return state.enabled; },
    get ready() { return state.ready; },
    get user() { return state.user; },
    get syncing() { return state.syncing; },
    get lastSync() { return state.lastSync; },
    get error() { return state.error; },
    subscribe(fn) { state.listeners.add(fn); return () => state.listeners.delete(fn); },
    signUp: notReady, signIn: notReady, signOut: notReady, resetPassword: notReady,
    pushNow: notReady,
  };
  function notReady() { return Promise.reject(new Error(state.enabled ? "Firebase yükleniyor…" : "Firebase yapılandırılmamış")); }

  if (!enabled) return; // yerel mod

  // Firebase compat SDK'larını dinamik yükle
  const load = (src) => new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = () => rej(new Error("SDK yüklenemedi: " + src));
    document.head.appendChild(s);
  });

  const V = "10.14.1";
  Promise.resolve()
    .then(() => load(`https://www.gstatic.com/firebasejs/${V}/firebase-app-compat.js`))
    .then(() => load(`https://www.gstatic.com/firebasejs/${V}/firebase-auth-compat.js`))
    .then(() => load(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore-compat.js`))
    .then(init)
    .catch((e) => { state.error = e.message; state.ready = true; emit(); });

  // SDK 10 sn içinde hiç yüklenmezse (ağ engeli, reklam engelleyici, CSP vb.) sonsuz "yükleniyor" yerine gerçek hata göster
  setTimeout(() => {
    if (!state.ready) {
      state.error = "Firebase sunucularına bağlanılamadı (ağ engeli veya reklam engelleyici olabilir). Sayfayı yenileyip tekrar deneyin.";
      state.ready = true;
      emit();
    }
  }, 10000);

  function init() {
    const app = firebase.initializeApp(cfg);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const STORAGE_KEY = "kese_finans_v1";

    let lastPushed = "";
    let pullApplied = false;

    const docRef = (uid) => db.collection("users").doc(uid);

    // Şema güncellemeleri (yeni-boş koleksiyon anahtarları) gerçek veri farkı değildir —
    // yoksa uygulama her yeni alan eklendiğinde açılışta sahte "çakışma" sorusu sorar.
    function normalizedStore(raw) {
      try {
        const o = JSON.parse(raw);
        const out = {};
        Object.keys(o).sort().forEach((k) => {
          const v = o[k];
          if (Array.isArray(v) && v.length === 0) return;
          out[k] = v;
        });
        return JSON.stringify(out);
      } catch (e) { return raw; }
    }

    async function pull(uid) {
      const snap = await docRef(uid).get();
      if (!snap.exists) return false;
      const remote = snap.data();
      if (!remote || !remote.store) return false;
      const localRaw = localStorage.getItem(STORAGE_KEY) || "";
      if (remote.store === localRaw) { lastPushed = localRaw; return false; }
      if (normalizedStore(remote.store) === normalizedStore(localRaw)) { lastPushed = localRaw; return false; }
      const localAt = parseInt(localStorage.getItem("kese_local_updated") || "0", 10);
      const remoteAt = remote.updatedAt || 0;
      let useRemote = true;
      if (localRaw && localAt > remoteAt) {
        useRemote = confirm("Bu cihazdaki veriler buluttakinden daha yeni görünüyor.\n\nTamam = buluttakini kullan (bu cihazdakini değiştirir)\nİptal = bu cihazdakini bulutla eşitle");
      }
      if (useRemote) {
        localStorage.setItem(STORAGE_KEY, remote.store);
        lastPushed = remote.store;
        return true; // reload gerekli
      }
      return false;
    }

    async function push(uid) {
      const raw = localStorage.getItem(STORAGE_KEY) || "";
      if (!raw || raw === lastPushed) return;
      state.syncing = true; emit();
      try {
        await docRef(uid).set({ store: raw, updatedAt: Date.now(), email: state.user?.email || "" });
        lastPushed = raw;
        state.lastSync = new Date();
        state.error = null;
      } catch (e) {
        state.error = "Senkron hatası: " + (e.message || e.code);
      } finally {
        state.syncing = false; emit();
      }
    }

    // localStorage güncelleme zamanını damgala (çakışma çözümü için)
    const origSetItem = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function (k, v) {
      origSetItem(k, v);
      if (k === STORAGE_KEY) { try { origSetItem("kese_local_updated", String(Date.now())); } catch (e) {} }
    };

    auth.onAuthStateChanged(async (u) => {
      state.user = u ? { uid: u.uid, email: u.email } : null;
      state.ready = true;
      emit();
      if (u && !pullApplied) {
        pullApplied = true;
        try {
          const needReload = await pull(u.uid);
          if (needReload) { location.reload(); return; }
          await push(u.uid); // bulutta hiç veri yoksa ilk yükleme
        } catch (e) { state.error = "Bulut verisi alınamadı: " + (e.message || e.code); emit(); }
      }
    });

    // Periyodik senkron (6 sn'de bir, değişiklik varsa)
    setInterval(() => { if (state.user && !state.syncing) push(state.user.uid); }, 6000);
    // Sayfa kapanırken son push (best effort)
    window.addEventListener("beforeunload", () => { if (state.user) { try { push(state.user.uid); } catch (e) {} } });

    const trErr = (e) => {
      const c = e.code || "";
      if (c.includes("email-already-in-use")) return "Bu e-posta zaten kayıtlı.";
      if (c.includes("invalid-email")) return "Geçersiz e-posta adresi.";
      if (c.includes("weak-password")) return "Şifre çok zayıf (en az 6 karakter).";
      if (c.includes("user-not-found") || c.includes("invalid-credential") || c.includes("wrong-password")) return "E-posta veya şifre hatalı.";
      if (c.includes("too-many-requests")) return "Çok fazla deneme — biraz bekle.";
      if (c.includes("network")) return "Ağ hatası — bağlantını kontrol et.";
      return e.message || "Bir hata oluştu.";
    };

    window.keseCloud.signUp = async (email, pass) => {
      try { await auth.createUserWithEmailAndPassword(email, pass); }
      catch (e) { throw new Error(trErr(e)); }
    };
    window.keseCloud.signIn = async (email, pass) => {
      try { pullApplied = false; await auth.signInWithEmailAndPassword(email, pass); }
      catch (e) { throw new Error(trErr(e)); }
    };
    window.keseCloud.signOut = async () => {
      if (state.user) { try { await push(state.user.uid); } catch (e) {} }
      await auth.signOut();
      pullApplied = false;
    };
    window.keseCloud.resetPassword = async (email) => {
      try { await auth.sendPasswordResetEmail(email); }
      catch (e) { throw new Error(trErr(e)); }
    };
    window.keseCloud.pushNow = async () => { if (state.user) await push(state.user.uid); };
  }
})();

</script>
<script type="text/babel">
// Kese — Hesap / üyelik arayüzü (Firebase auth üstüne)
// CloudAccountRow: Ayarlar modalında hesap durumu satırı
// CloudAuthModal: giriş / kayıt penceresi

const { useState: useStateCl, useEffect: useEffectCl } = React;

function useCloud() {
  const [, force] = useStateCl(0);
  useEffectCl(() => window.keseCloud ? window.keseCloud.subscribe(() => force((x) => x + 1)) : undefined, []);
  return window.keseCloud || { enabled: false };
}

function CloudAccountRow({ onOpenAuth }) {

      <Icon name="chevronRight" size={16} />

}

function CloudAuthModal({ open, onClose }) {
  const cloud = useCloud();
  const [mode, setMode] = useStateCl("signin"); // signin | signup | reset
  const [email, setEmail] = useStateCl("");
  const [pass, setPass] = useStateCl("");
  const [pass2, setPass2] = useStateCl("");
  const [busy, setBusy] = useStateCl(false);
  const [err, setErr] = useStateCl("");
  const [info, setInfo] = useStateCl("");

  useEffectCl(() => {
    if (open) { setMode("signin"); setErr(""); setInfo(""); setPass(""); setPass2(""); setBusy(false); }
  }, [open]);

  useEffectCl(() => {
    if (!open) return;
    const onEsc = (e) => e.key === "Escape" && onClose();
    document.addEventListener("keydown", onEsc);
    return () => document.removeEventListener("keydown", onEsc);
  }, [open, onClose]);

  // Giriş başarılı olunca kapan
  useEffectCl(() => { if (open && cloud.user) onClose(); }, [open, cloud.user]);

  if (!open) return null;
  const emailOk = /\S+@\S+\.\S+/.test(email);
  const notConnected = !cloud.ready;
  const canSubmit = !busy && !notConnected && emailOk && (mode === "reset" || pass.length >= 6) && (mode !== "signup" || pass === pass2);

  const submit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setBusy(true); setErr(""); setInfo("");
    try {
      if (mode === "signup") await window.keseCloud.signUp(email.trim(), pass);
      else if (mode === "signin") await window.keseCloud.signIn(email.trim(), pass);
      else { await window.keseCloud.resetPassword(email.trim()); setInfo("Şifre sıfırlama bağlantısı e-postana gönderildi."); }
    } catch (ex) {
      setErr(ex.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="modal-bd" onClick={onClose}>
      <form className="modal cl-modal" onClick={(e) => e.stopPropagation()} onSubmit={submit}>
        <header className="modal-h">
          <div>
            <h2>{mode === "signup" ? "Üye ol" : mode === "reset" ? "Şifre sıfırla" : "Giriş yap"}</h2>
            <p>{mode === "signup" ? "Verilerin buluta güvenle yedeklenir" : mode === "reset" ? "Kayıtlı e-postanı gir" : "Kese hesabınla devam et"}</p>
          </div>
          <button type="button" className="icon-btn" onClick={onClose}><Icon name="x" size={18} /></button>
        </header>
        <div className="modal-b">
          <label className="field">
            <span className="field-l">E-posta</span>
            <input type="email" autoFocus placeholder="ornek@eposta.com" value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="email" />
          </label>
          {mode !== "reset" && (
            <label className="field">
              <span className="field-l">Şifre</span>
              <input type="password" placeholder="En az 6 karakter" value={pass} onChange={(e) => setPass(e.target.value)} autoComplete={mode === "signup" ? "new-password" : "current-password"} />
            </label>
          )}
          {mode === "signup" && (
            <label className="field">
              <span className="field-l">Şifre (tekrar)</span>
              <input type="password" placeholder="Şifreni doğrula" value={pass2} onChange={(e) => setPass2(e.target.value)} autoComplete="new-password" />
              {pass2 && pass !== pass2 && <span className="cl-mismatch">Şifreler eşleşmiyor</span>}
            </label>
          )}
          {err && <div className="ai-error"><Icon name="info" size={14} />{err}</div>}
          {!err && notConnected && !cloud.error && <div className="cl-info"><Icon name="info" size={14} />Buluta bağlanıyor…</div>}
          {!err && cloud.error && notConnected && <div className="ai-error"><Icon name="info" size={14} />{cloud.error}</div>}
          {info && <div className="cl-info"><Icon name="check" size={14} />{info}</div>}
          <div className="cl-links">
            {mode !== "signin" && <button type="button" className="cl-link" onClick={() => { setMode("signin"); setErr(""); setInfo(""); }}>Giriş yap</button>}
            {mode !== "signup" && <button type="button" className="cl-link" onClick={() => { setMode("signup"); setErr(""); setInfo(""); }}>Üye ol</button>}
            {mode !== "reset" && <button type="button" className="cl-link" onClick={() => { setMode("reset"); setErr(""); setInfo(""); }}>Şifremi unuttum</button>}
          </div>
        </div>
        <footer className="modal-f">
          <button type="button" className="btn btn-ghost btn-md" onClick={onClose}>İptal</button>
          <button type="submit" className="btn btn-primary btn-md" disabled={!canSubmit}>
            {busy ? <span className="ai-spin" /> : mode === "signup" ? "Üye ol" : mode === "reset" ? "Bağlantı gönder" : "Giriş yap"}
          </button>
        </footer>
      </form>
    </div>
  );
}

Object.assign(window, { CloudAccountRow, CloudAuthModal, useCloud });

<script type="text/babel">
// Toplu Giriş — haftalık/geç kalınmış veri girişi için tek ekranda çoklu işlem
// Her satır serbest metin: "market 250 tl" — hepsi ayrıştırılıp önizlenir, tek dokunuşla kaydedilir
// ─────────────────────────────────────────────────────────

const { useState: useStateBA, useEffect: useEffectBA, useMemo: useMemoBA } = React;

function BulkAddModal({ open, onClose, onSubmitBulk, accounts = [] }) {
  const [raw, setRaw] = useStateBA("");
  const [account, setAccount] = useStateBA("");
  const [date, setDate] = useStateBA("");
  const [rowOverrides, setRowOverrides] = useStateBA({}); // index -> { category, type }

  useEffectBA(() => {
    if (!open) return;
    if (!account || !accounts.some((a) => a.id === account)) setAccount(accounts[0]?.id || "");
    if (!date) setDate(appToday().toISOString().slice(0, 10));
    const onEsc = (e) => e.key === "Escape" && onClose();
    document.addEventListener("keydown", onEsc);
    return () => document.removeEventListener("keydown", onEsc);
  }, [open, onClose, accounts]);

  useEffectBA(() => { if (!open) { setRaw(""); setRowOverrides({}); setDate(""); } }, [open]);

  const lines = raw.split("\n").map((l) => l.trim()).filter(Boolean);

  const rows = useMemoBA(() => {
    return lines.map((line, i) => {
      const parsed = window.parseQuickEntry(line, APP_DATA.categories);
      const ov = rowOverrides[i] || {};
      return parsed ? { ...parsed, ...ov, line } : null;
    });
  }, [raw, rowOverrides]);

  if (!open) return null;

  const validRows = rows.filter((r) => r && r.amount > 0);
  const invalidCount = rows.length - validRows.length;

  const setOverride = (i, patch) => {
    setRowOverrides((prev) => ({ ...prev, [i]: { ...prev[i], ...patch } }));
  };

  const submit = () => {
    if (!account || validRows.length === 0) return;
    const isoDate = date ? new Date(date + "T12:00:00").toISOString() : appToday().toISOString();
    const txs = validRows.map((r) => ({
      name: r.name,
      amount: r.type === "expense" ? -Math.abs(r.amount) : Math.abs(r.amount),
      category: r.category,
      account,
      note: "",
      date: isoDate,
    }));
    onSubmitBulk(txs);
    setRaw(""); setRowOverrides({});
    onClose();
  };

  return (
    <div className="modal-bd" onClick={onClose}>
      <div className="modal bulk-modal" onClick={(e) => e.stopPropagation()}>
        <header className="modal-h">
          <div>
            <h2>Toplu giriş</h2>
            <p>Bir haftalık işlemi tek seferde gir — her satır bir işlem</p>
          </div>
          <button type="button" className="icon-btn" onClick={onClose}><Icon name="x" size={18} /></button>
        </header>

        <div className="modal-b bulk-modal-b">
          <label className="field">
            <span className="field-l">Hesap</span>
            <select value={account} onChange={(e) => setAccount(e.target.value)}>
              {accounts.length === 0 && <option value="">Hesap yok</option>}
              {accounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </label>

          <label className="field">
            <span className="field-l">Tarih</span>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
          </label>

          <label className="field">
            <span className="field-l">İşlemler (her satıra bir tane)</span>
            <textarea
              rows="6"
              className="bulk-textarea"
              autoFocus
              placeholder={"market 250 tl\nkira 8500\nyemeksepeti 180\nmaaş 45000"}
              value={raw}
              onChange={(e) => setRaw(e.target.value)}
            />
          </label>

          {lines.length > 0 && (
            <div className="bulk-preview">
              <div className="bulk-preview-h">
                <span>{validRows.length} işlem ayrıştırıldı</span>
                {invalidCount > 0 && <span className="bulk-preview-warn">{invalidCount} satırda tutar bulunamadı</span>}
              </div>
              <div className="bulk-rows">
                {rows.map((r, i) => {
                  if (!r) {
                    return (
                      <div key={i} className="bulk-row bulk-row-bad">
                        <Icon name="x" size={14} />
                        <span className="bulk-row-line">{lines[i]}</span>
                        <span className="bulk-row-note">tutar yok, atlanacak</span>
                      </div>
                    );
                  }
                  const cat = APP_DATA.categories.find((c) => c.id === r.category);
                  return (
                    <div key={i} className="bulk-row">
                      <span className="bulk-row-dot" style={{ background: cat?.color || "#64748b" }} />
                      <input
                        className="bulk-row-name"
                        value={r.name}
                        onChange={(e) => setOverride(i, { name: e.target.value })}
                      />
                      <select
                        className="bulk-row-cat"
                        value={r.category}
                        onChange={(e) => setOverride(i, { category: e.target.value })}
                      >
                        {APP_DATA.categories.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
                      </select>
                      <button
                        type="button"
                        className={`bulk-row-type ${r.type === "income" ? "bulk-row-type-inc" : ""}`}
                        title="Gelir/gider değiştir"
                        onClick={() => setOverride(i, { type: r.type === "income" ? "expense" : "income" })}
                      >
                        <Icon name={r.type === "income" ? "arrowDown" : "arrowUp"} size={12} />
                      </button>
                      <span className={`mono bulk-row-amt ${r.type === "income" ? "pos" : "neg"}`}>
                        {r.type === "income" ? "+" : "−"}₺{APP_DATA.fmt(r.amount)}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <footer className="modal-f">
          <button type="button" className="btn btn-ghost btn-md" onClick={onClose}>İptal</button>
          <button type="button" className="btn btn-primary btn-md" disabled={validRows.length === 0 || !account} onClick={submit}>
            {validRows.length > 0 ? `${validRows.length} işlemi kaydet` : "İşlemi kaydet"}
          </button>
        </footer>
      </div>
    </div>
  );
}

<script type="text/babel">
// App shell: sidebar, topbar, modal, main router
// ────────────────────────────────────────────

const { useState: useStateA, useEffect: useEffectA } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "accent": "emerald",
  "density": "regular"
}/*EDITMODE-END*/;

// ── Persistence ────────────────────────────────
const STORAGE_KEY = "kese_finans_v1";

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    console.warn("Kayıtlı veri okunamadı:", e);
    return null;
  }
}

function usePersistentState(key, fallback) {
  const stored = React.useMemo(() => {
    const s = loadStore();
    return s && key in s ? s[key] : fallback;
  }, [key]);
  const [value, setValue] = React.useState(stored);
  // Persist on change
  React.useEffect(() => {
    try {
      const s = loadStore() || {};
      s[key] = value;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    } catch (e) {
      console.warn("Veri kaydedilemedi:", e);
    }
  }, [key, value]);
  return [value, setValue];
}

function TopBar({ onAddTransaction, onBulkAdd, ctx }) {
  const { transactions, accounts, budgets, scheduled, goals, onNavigate, setGlobalQuery } = ctx;
  const [q, setQ] = useStateA("");
  const [searchOpen, setSearchOpen] = useStateA(false);
  const [bellOpen, setBellOpen] = useStateA(false);
  const today = appToday();

  // ── Arama sonuçları ──
  const ql = q.trim().toLowerCase();
  const txMatches = ql ? transactions.filter((tx) => !isTransferLeg(tx) && (tx.name.toLowerCase().includes(ql) || (tx.note || "").toLowerCase().includes(ql))).slice(0, 6) : [];
  const accMatches = ql ? accounts.filter((a) => a.name.toLowerCase().includes(ql)).slice(0, 4) : [];
  const hasResults = txMatches.length > 0 || accMatches.length > 0;

  const goSearch = () => {
    setGlobalQuery && setGlobalQuery(q);
    onNavigate("islemler");
    setSearchOpen(false);
  };

  // ── Bildirimler ──
  const notifs = React.useMemo(() => {
    const list = [];
    const ymd = (d) => localYMD(d);
    const todayKey = ymd(today);
    const in7 = new Date(today); in7.setDate(today.getDate() + 7);
    const in7Key = ymd(in7);
    // Yaklaşan planlı ödemeler (7 gün)
    (scheduled || []).filter((s) => s.active && s.nextDate >= todayKey && s.nextDate <= in7Key)
      .sort((a, b) => a.nextDate.localeCompare(b.nextDate))
      .forEach((s) => {
        const d = parseLocalDate(s.nextDate);
        const days = Math.round((new Date(d.getFullYear(), d.getMonth(), d.getDate()) - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000);
        list.push({ icon: "calendar", color: "#0ea5e9", title: s.name, desc: `${days === 0 ? "Bugün" : days === 1 ? "Yarın" : days + " gün sonra"} · ₺${APP_DATA.fmt(Math.abs(s.amount))}`, nav: "odemeler" });
      });
    // Bütçe aşımı / yaklaşma
    const mStart = new Date(today.getFullYear(), today.getMonth(), 1);
    const spent = {};
    transactions.forEach((tx) => { if (!isTransferLeg(tx) && tx.amount < 0 && new Date(tx.date) >= mStart) spent[tx.category] = (spent[tx.category] || 0) + -tx.amount; });
    (budgets || []).forEach((b) => {
      const used = spent[b.category] || 0;
      const cat = APP_DATA.categories.find((c) => c.id === b.category);
      const pct = b.limit ? used / b.limit * 100 : 0;
      if (pct >= 100) list.push({ icon: "pie", color: "#ef4444", title: `Bütçe aşıldı: ${cat?.label || b.category}`, desc: `₺${APP_DATA.fmt(used)} / ₺${APP_DATA.fmt(b.limit)} (%${pct.toFixed(0)})`, nav: "butce" });
      else if (pct >= 85) list.push({ icon: "pie", color: "#f59e0b", title: `Bütçe sınırına yakın: ${cat?.label || b.category}`, desc: `%${pct.toFixed(0)} kullanıldı`, nav: "butce" });
    });
    // Kredi kartı yüksek kullanım
    accounts.filter((a) => a.type.includes("Kart") && a.limit).forEach((a) => {
      const owed = Math.max(0, -a.balance);
      const util = a.limit ? owed / a.limit * 100 : 0;
      if (util >= 70) list.push({ icon: "card", color: util >= 90 ? "#ef4444" : "#f59e0b", title: `${a.name} kullanımı yüksek`, desc: `%${util.toFixed(0)} · ₺${APP_DATA.fmt(owed)} borç`, nav: "borclar" });
    });
    // Düşük bakiye (vadesiz/maaş)
    accounts.filter((a) => !a.type.includes("Kart") && a.balance >= 0 && a.balance < 500).forEach((a) => {
      list.push({ icon: "wallet", color: "#f59e0b", title: `${a.name} bakiyesi düşük`, desc: `₺${APP_DATA.fmt(a.balance)}`, nav: "hesaplar" });
    });
    // Hedef tamamlandı
    (goals || []).filter((g) => g.saved >= g.target && g.target > 0).forEach((g) => {
      list.push({ icon: "target", color: "#22c55e", title: `Hedef tamamlandı: ${g.name}`, desc: `₺${APP_DATA.fmt(g.target)} 🎉`, nav: "hedefler" });
    });
    return list;
  }, [transactions, accounts, budgets, scheduled, goals]);

  const goNotif = (n) => { onNavigate(n.nav); setBellOpen(false); };

  return (
    <header className="topbar">
      <div className="topbar-search-wrap">
        <div className={`search-input topbar-search ${searchOpen && q ? "search-input-open" : ""}`}>
          <Icon name="search" size={16}/>
          <input
            type="text"
            placeholder="İşlem, kategori veya hesap ara..."
            value={q}
            onChange={(e) => { setQ(e.target.value); setSearchOpen(true); }}
            onFocus={() => setSearchOpen(true)}
            onBlur={() => setTimeout(() => setSearchOpen(false), 150)}
            onKeyDown={(e) => { if (e.key === "Enter") goSearch(); if (e.key === "Escape") { setQ(""); setSearchOpen(false); e.target.blur(); } }}
          />
          {q ? <button className="search-clear" onClick={() => { setQ(""); }}><Icon name="x" size={14}/></button> : <span className="kbd">⏎</span>}
        </div>
        {searchOpen && q && (
          <div className="search-dropdown">
            {!hasResults && <div className="search-empty">"{q}" için sonuç yok</div>}
            {accMatches.length > 0 && (
              <div className="search-group">
                <div className="search-group-t">Hesaplar</div>
                {accMatches.map((a) => (
                  <button key={a.id} className="search-res" onMouseDown={(e) => { e.preventDefault(); onNavigate("hesaplar"); setSearchOpen(false); setQ(""); }}>
                    <span className="search-res-dot" style={{ background: a.color }}/>
                    <span className="search-res-n">{a.name}</span>
                    <span className="search-res-amt mono">₺{APP_DATA.fmt(a.balance)}</span>
                  </button>
                ))}
              </div>
            )}
            {txMatches.length > 0 && (
              <div className="search-group">
                <div className="search-group-t">İşlemler</div>
                {txMatches.map((tx) => {
                  const cat = APP_DATA.categories.find((c) => c.id === tx.category);
                  return (
                    <button key={tx.id} className="search-res" onMouseDown={(e) => { e.preventDefault(); goSearch(); }}>
                      <span className="search-res-ic" style={{ background: `${cat?.color || "#64748b"}22`, color: cat?.color || "#64748b" }}>{tx.name[0]}</span>
                      <span className="search-res-n">{tx.name}<span className="search-res-sub">{fmtDate(tx.date)}</span></span>
                      <span className={`search-res-amt mono ${tx.amount < 0 ? "neg" : "pos"}`}>{tx.amount < 0 ? "−" : "+"}₺{APP_DATA.fmt(Math.abs(tx.amount))}</span>
                    </button>
                  );
                })}
              </div>
            )}
            {hasResults && <button className="search-all" onMouseDown={(e) => { e.preventDefault(); goSearch(); }}>Tüm sonuçları İşlemler'de gör →</button>}
          </div>
        )}
      </div>
      <div className="topbar-actions">
        <div className="bell-wrap">
          <button className="icon-btn" onClick={() => setBellOpen((v) => !v)} title="Bildirimler">
            <Icon name="bell" size={18}/>
            {notifs.length > 0 && <span className="notif-badge">{notifs.length}</span>}
          </button>
          {bellOpen && (
            <>
              <div className="bell-backdrop" onClick={() => setBellOpen(false)}/>
              <div className="bell-popover">
                <div className="bell-h">
                  <span>Bildirimler</span>
                  {notifs.length > 0 && <span className="bell-count">{notifs.length}</span>}
                </div>
                {notifs.length === 0 ? (
                  <div className="bell-empty"><Icon name="check" size={20}/><span>Her şey yolunda — bildirim yok</span></div>
                ) : (
                  <div className="bell-list">
                    {notifs.map((n, i) => (
                      <button key={i} className="bell-item" onClick={() => goNotif(n)}>
                        <span className="bell-ic" style={{ background: `${n.color}22`, color: n.color }}><Icon name={n.icon} size={15}/></span>
                        <span className="bell-b">
                          <span className="bell-t">{n.title}</span>
                          <span className="bell-d">{n.desc}</span>
                        </span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </>
          )}
        </div>
        <button className="btn btn-ghost btn-md" onClick={onBulkAdd} title="Birden fazla işlemi tek seferde gir">
          <Icon name="list" size={16}/>
          Toplu giriş
        </button>
        <button className="btn btn-primary btn-md" onClick={onAddTransaction}>
          <Icon name="plus" size={16}/>
          Yeni işlem
        </button>
      </div>
    </header>
  );
}

function AddTxModal({ open, onClose, onSubmit, accounts = [], onAddTransfer }) {
  const [type, setType] = useStateA("expense");
  const [name, setName] = useStateA("");
  const [amount, setAmount] = useStateA("");
  const [category, setCategory] = useStateA("market");
  const [account, setAccount] = useStateA("");
  const [toAccount, setToAccount] = useStateA("");
  const [note, setNote] = useStateA("");
  const [quickText, setQuickText] = useStateA("");

  useEffectA(() => {
    if (!open) return;
    if (!account || !accounts.some(a => a.id === account)) setAccount(accounts[0]?.id || "");
    if (!toAccount || !accounts.some(a => a.id === toAccount)) setToAccount(accounts[1]?.id || accounts[0]?.id || "");
    const onEsc = (e) => e.key === "Escape" && onClose();
    document.addEventListener("keydown", onEsc);
    return () => document.removeEventListener("keydown", onEsc);
  }, [open, onClose, accounts]);

  useEffectA(() => {
    if (!open) { setQuickText(""); }
  }, [open]);

  if (!open) return null;

  const noAccounts = accounts.length === 0;

  const runQuickParse = (text) => {
    setQuickText(text);
    const parsed = window.parseQuickEntry(text, APP_DATA.categories);
    if (!parsed) return;
    setType(parsed.type);
    setCategory(parsed.category);
    setName(parsed.name);
    if (parsed.amount != null && !isNaN(parsed.amount)) setAmount(String(parsed.amount));
  };

  const submitFromQuick = (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    const parsed = window.parseQuickEntry(quickText, APP_DATA.categories);
    if (!parsed || !parsed.amount || parsed.amount <= 0 || !account) return;
    onSubmit({
      name: parsed.name,
      amount: parsed.type === "expense" ? -Math.abs(parsed.amount) : Math.abs(parsed.amount),
      category: parsed.category,
      account,
      note: "",
      date: appToday().toISOString(),
    });
    setQuickText(""); setName(""); setAmount(""); setNote("");
    onClose();
  };

  const submit = (e) => {
    e.preventDefault();
    const amt = parseFloat(String(amount).replace(",", "."));
    if (!amt || amt <= 0 || !account) return;
    if (type === "transfer") {
      if (!toAccount || toAccount === account) return;
      onAddTransfer && onAddTransfer({ from: account, to: toAccount, amount: Math.abs(amt), note: note || name });
    } else {
      if (!name) return;
      onSubmit({
        name,
        amount: type === "expense" ? -Math.abs(amt) : Math.abs(amt),
        category,
        account,
        note,
        date: appToday().toISOString(),
      });
    }
    setName(""); setAmount(""); setNote("");
    onClose();
  };

  return (
    <div className="modal-bd" onClick={onClose}>
      <form className="modal" onClick={(e)=>e.stopPropagation()} onSubmit={submit}>
        <header className="modal-h">
          <div>
            <h2>Yeni işlem</h2>
            <p>Gelir veya gider kaydı oluştur</p>
          </div>
          <button type="button" className="icon-btn" onClick={onClose}><Icon name="x" size={18}/></button>
        </header>

        {type !== "transfer" && (
          <div style={{margin:"14px 24px 0"}}>
            <div className="quick-add-box">
              <Icon name="zap" size={15} />
              <input
                type="text"
                autoFocus
                placeholder="Hızlı ekle: örn. 'market 250 tl' — Enter'a bas, direkt kaydedilsin"
                value={quickText}
                onChange={(e) => runQuickParse(e.target.value)}
                onKeyDown={submitFromQuick}
              />
            </div>
            <p className="quick-add-hint">Yazınca tutar, kategori ve isim otomatik dolar — aşağıdan kontrol edip düzenleyebilirsin.</p>
          </div>
        )}

        <div className="seg seg-lg" style={{margin:"12px 24px 0"}}>
          <button type="button" className={type==="expense"?"seg-act":""} onClick={()=>setType("expense")}>
            <Icon name="arrowUp" size={14}/>Gider
          </button>
          <button type="button" className={type==="income"?"seg-act":""} onClick={()=>setType("income")}>
            <Icon name="arrowDown" size={14}/>Gelir
          </button>
          <button type="button" className={type==="transfer"?"seg-act":""} onClick={()=>setType("transfer")}>
            <Icon name="repeat" size={14}/>Transfer
          </button>
        </div>

        <div className="modal-b">
          <div className="amount-input">
            <span className="amount-curr">₺</span>
            <input
              type="text"
              placeholder="0,00"
              value={amount}
              onChange={(e)=>setAmount(e.target.value)}
              className="amount-val mono"
            />
          </div>

          {noAccounts && (
            <div className="transfer-warn neg" style={{marginBottom:4}}>Önce bir hesap eklemelisin — Hesaplar sekmesinden ekleyebilirsin.</div>
          )}

          {type !== "transfer" && (
          <label className="field">
            <span className="field-l">İşlem adı</span>
            <input
              type="text"
              placeholder="örn. Migros alışveriş"
              value={name}
              onChange={(e)=>setName(e.target.value)}
            />
          </label>
          )}

          {type === "transfer" ? (
            <div className="field-row">
              <label className="field">
                <span className="field-l">Gönderen hesap</span>
                <select value={account} onChange={(e)=>setAccount(e.target.value)}>
                  {accounts.length === 0 && <option value="">Hesap yok</option>}
                  {accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                </select>
              </label>
              <label className="field">
                <span className="field-l">Alıcı hesap</span>
                <select value={toAccount} onChange={(e)=>setToAccount(e.target.value)}>
                  {accounts.length === 0 && <option value="">Hesap yok</option>}
                  {accounts.filter(a=>a.id!==account).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                </select>
              </label>
            </div>
          ) : (
          <div className="field-row">
            <label className="field">
              <span className="field-l">Kategori</span>
              <select value={category} onChange={(e)=>setCategory(e.target.value)}>
                {APP_DATA.categories.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </label>
            <label className="field">
              <span className="field-l">Hesap</span>
              <select value={account} onChange={(e)=>setAccount(e.target.value)}>
                {accounts.length === 0 && <option value="">Hesap yok</option>}
                {accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
            </label>
          </div>
          )}

          <label className="field">
            <span className="field-l">Not (opsiyonel)</span>
            <textarea
              rows="2"
              placeholder="İşlem hakkında not..."
              value={note}
              onChange={(e)=>setNote(e.target.value)}
            />
          </label>
        </div>

        <footer className="modal-f">
          <button type="button" className="btn btn-ghost btn-md" onClick={onClose}>İptal</button>
          <button type="submit" className="btn btn-primary btn-md" disabled={noAccounts}>{type === "transfer" ? "Transferi yap" : "İşlemi kaydet"}</button>
        </footer>
      </form>
    </div>
  );
}

// Anahtar girme satırı — native window.prompt() bazı tarayıcı/ortamlarda (embedded webview,
// otomasyon vb.) sessizce çalışmayabiliyor; bunun yerine satır içi (inline) bir giriş alanı açar.
function ApiKeyRow({ storageKey, icon, iconBg, iconColor, title, descUnset, placeholder }) {
  const [editing, setEditing] = useStateA(false);
  const [val, setVal] = useStateA("");
  const [stored, setStored] = useStateA(() => localStorage.getItem(storageKey) || "");

  const doSave = () => {
    const v = val.trim();
    if (v) { localStorage.setItem(storageKey, v); setStored(v); }
    else { localStorage.removeItem(storageKey); setStored(""); }
    setEditing(false);
  };
  const doRemove = () => { localStorage.removeItem(storageKey); setStored(""); setVal(""); setEditing(false); };

  if (editing) {
    return (
      <div className="set-row" style={{ flexDirection: "column", alignItems: "stretch", cursor: "default" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div className="set-row-icon" style={{ background: iconBg, color: iconColor }}><Icon name={icon} size={16}/></div>
          <div className="set-row-b"><div className="set-row-t">{title}</div></div>
        </div>
        <input
          type="text"
          autoFocus
          value={val}
          placeholder={placeholder}
          onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); doSave(); } else if (e.key === "Escape") setEditing(false); }}
          style={{ width: "100%", marginTop: 10, background: "var(--bg-elev)", border: "1px solid var(--border)", borderRadius: 8, padding: "9px 11px", fontSize: 13, color: "var(--fg)", fontFamily: "inherit", outline: "none" }}
        />
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 10 }}>
          <button type="button" className="btn btn-ghost btn-sm" onClick={() => setEditing(false)}>Vazgeç</button>
          {stored && <button type="button" className="btn btn-ghost btn-sm" onClick={doRemove}>Sil</button>}
          <button type="button" className="btn btn-primary btn-sm" onClick={doSave}>Kaydet</button>
        </div>
      </div>
    );
  }

  return (
    <div className="set-row" onClick={() => { setVal(stored); setEditing(true); }}>
      <div className="set-row-icon" style={{ background: iconBg, color: iconColor }}><Icon name={icon} size={16}/></div>
      <div className="set-row-b">
        <div className="set-row-t">{title}</div>
        <div className="set-row-d">{stored ? "Anahtar kayıtlı ✓ — değiştirmek/silmek için tıkla" : descUnset}</div>
      </div>
      <Icon name="chevronRight" size={16}/>
    </div>
  );
}
